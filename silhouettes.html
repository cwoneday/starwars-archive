<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아키타입 실루엣 라이브러리 · SILHOUETTES</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-void:#04060b;--bg-panel:#0e131c;--bg-elevated:#141b27;
  --text:#dce4ee;--dim:#8b97a8;--faint:#515c6b;--line:#1b2532;
  --holo:#45d4e3;--saber:#ff5a4d;--amber:#f4b740;--rose:#ff79c6;--green:#7ee787;--sand:#c2a86a;
  --fd:'Chakra Petch',sans-serif;--fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fm);color:var(--text);background:
  radial-gradient(1000px 700px at 50% -10%,#0a1018,transparent 60%),var(--bg-void);
  min-height:100vh;padding:40px 24px}
.head{max-width:1100px;margin:0 auto 32px}
.kicker{font-family:var(--fm);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--holo);margin-bottom:8px}
h1{font-family:var(--fd);font-weight:700;font-size:2rem;letter-spacing:.02em}
.sub{color:var(--dim);font-size:13px;margin-top:8px;line-height:1.6;max-width:680px}
.note{color:var(--faint);font-size:11px;margin-top:10px;border-left:2px solid var(--line);padding-left:10px;line-height:1.6;max-width:680px}
.grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px}
.card{background:linear-gradient(180deg,var(--bg-panel),var(--bg-void));border:1px solid var(--line);border-radius:8px;
  padding:22px 16px 16px;text-align:center;position:relative;overflow:hidden;transition:border-color .25s,box-shadow .25s}
.card::before{content:"";position:absolute;top:-1px;left:-1px;width:16px;height:16px;border:1.5px solid var(--holo);border-right:0;border-bottom:0;opacity:.5}
.card:hover{border-color:var(--holo);box-shadow:0 0 22px rgba(69,212,227,.18)}
.svgwrap{height:150px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:14px;filter:drop-shadow(0 0 10px currentColor);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.card:hover .svgwrap{transform:scale(1.12)}
.svgwrap svg{height:140px;width:auto}
.key{font-family:var(--fm);font-size:11px;letter-spacing:.1em;color:var(--text);text-transform:uppercase}
.ko{font-family:var(--fd);font-weight:600;font-size:15px;margin-top:2px}
.ex{font-family:var(--fm);font-size:10px;color:var(--faint);margin-top:6px;line-height:1.4}
</style>
</head>
<body>

<!-- ===== 재사용 실루엣 심볼 정의 (color=tint, --blade=accent) ===== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <!-- JEDI : 후드 로브 + 광선검(위) -->
  <symbol id="sil-jedi" viewBox="0 0 100 130">
    <g fill="currentColor">
      <path d="M50 30 C41 30 35 36 33 46 L26 120 C25 125 29 126 33 126 L67 126 C71 126 75 125 74 120 L67 46 C65 36 59 30 50 30 Z"/>
      <path d="M50 8 C36 8 28 22 31 42 C31 42 39 30 50 30 C61 30 69 42 69 42 C72 22 64 8 50 8 Z"/>
      <path d="M66 48 C74 50 80 56 80 66 L74 66 C74 58 70 54 64 53 Z"/>
      <rect x="75" y="64" width="9" height="9" rx="1.5"/>
    </g>
    <rect x="77" y="10" width="5" height="56" rx="2.5" fill="var(--blade,#45d4e3)"/>
  </symbol>

  <!-- SITH : 뾰족 후드 + 어깨 스파이크 + 광선검(아래/붉음) -->
  <symbol id="sil-sith" viewBox="0 0 100 130">
    <g fill="currentColor">
      <path d="M50 30 C40 30 34 37 32 47 L24 122 C23 127 28 127 32 127 L68 127 C72 127 77 127 76 122 L68 47 C66 37 60 30 50 30 Z"/>
      <path d="M50 5 C33 8 25 25 31 44 C31 44 39 30 50 30 C61 30 69 44 69 44 C75 25 67 8 50 5 Z"/>
      <path d="M33 47 L24 39 L37 51 Z"/><path d="M67 47 L76 39 L63 51 Z"/>
      <path d="M68 50 C78 52 86 58 88 70 L82 72 C80 62 74 57 66 56 Z"/>
      <rect x="83" y="86" width="9" height="9" rx="1.5"/>
    </g>
    <rect x="85" y="40" width="5" height="48" rx="2.5" fill="var(--blade,#ff5a4d)"/>
  </symbol>

  <!-- DROID : 돔 + 원통 몸체 + 다리 (제너릭 아스트로멕) -->
  <symbol id="sil-droid" viewBox="0 0 100 130">
    <g fill="currentColor">
      <path d="M30 56 C30 36 70 36 70 56 Z"/>
      <rect x="30" y="56" width="40" height="50" rx="5"/>
      <path d="M30 62 L17 66 L19 112 L30 109 Z"/>
      <path d="M70 62 L83 66 L81 112 L70 109 Z"/>
      <rect x="43" y="100" width="14" height="20" rx="3"/>
    </g>
    <circle cx="50" cy="49" r="4.5" fill="var(--blade,#45d4e3)"/>
  </symbol>

  <!-- TROOPER : 제너릭 장갑 헬멧 + 흉갑 + 블래스터 -->
  <symbol id="sil-trooper" viewBox="0 0 100 130">
    <g fill="currentColor">
      <path d="M50 12 C35 12 31 25 32 38 C32 45 38 50 50 50 C62 50 68 45 68 38 C69 25 65 12 50 12 Z"/>
      <rect x="44" y="48" width="12" height="9"/>
      <path d="M34 57 C34 54 66 54 66 57 L70 100 C70 104 66 104 62 104 L38 104 C34 104 30 104 30 100 Z"/>
      <rect x="38" y="102" width="10" height="24" rx="2"/><rect x="52" y="102" width="10" height="24" rx="2"/>
      <path d="M34 59 L23 63 L26 92 L35 90 Z"/><path d="M66 59 L78 63 L86 88 L77 91 Z"/>
      <rect x="72" y="80" width="26" height="5" rx="1.5" transform="rotate(16 72 80)"/>
    </g>
    <rect x="37" y="30" width="26" height="5" rx="2.5" fill="var(--blade,#45d4e3)" opacity=".85"/>
  </symbol>

  <!-- PILOT : 비행 헬멧 + 고글 + 생명유지 박스 -->
  <symbol id="sil-pilot" viewBox="0 0 100 130">
    <g fill="currentColor">
      <circle cx="50" cy="30" r="18"/>
      <path d="M37 36 C37 49 63 49 63 36 L63 45 C63 53 37 53 37 45 Z"/>
      <path d="M35 52 L29 116 L45 116 L47 74 L53 74 L55 116 L71 116 L65 52 Z"/>
      <rect x="41" y="58" width="18" height="15" rx="2"/>
    </g>
    <circle cx="43" cy="28" r="5" fill="var(--blade,#45d4e3)"/><circle cx="57" cy="28" r="5" fill="var(--blade,#45d4e3)"/>
  </symbol>

  <!-- BOUNTY-HUNTER : 각진 헬멧 + 안테나 + 제트팩 + 라이플 -->
  <symbol id="sil-bounty" viewBox="0 0 100 130">
    <g fill="currentColor">
      <path d="M39 16 L61 16 L65 36 C65 44 35 44 35 36 Z"/>
      <rect x="58" y="5" width="3" height="13"/>
      <path d="M35 46 L31 104 L44 104 L46 72 L54 72 L56 104 L69 104 L65 46 Z"/>
      <rect x="60" y="44" width="13" height="24" rx="2"/>
      <rect x="28" y="64" width="46" height="6" rx="2" transform="rotate(-8 28 64)"/>
    </g>
    <path d="M46 26 L54 26 L52 40 L48 40 Z" fill="var(--blade,#45d4e3)" opacity=".9"/>
  </symbol>

  <!-- ROYALTY / POLITICIAN : 머리장식 + 넓은 가운 -->
  <symbol id="sil-royal" viewBox="0 0 100 130">
    <g fill="currentColor">
      <path d="M50 6 C34 6 27 20 30 30 L21 20 L29 36 L20 34 L31 42 C29 46 41 48 50 48 C59 48 71 46 69 42 L80 34 L71 36 L79 20 L70 30 C73 20 66 6 50 6 Z"/>
      <circle cx="50" cy="36" r="10"/>
      <path d="M42 48 L58 48 L76 122 C76 126 72 126 68 126 L32 126 C28 126 24 126 24 122 Z"/>
      <path d="M41 48 L50 60 L59 48 Z"/>
    </g>
    <circle cx="50" cy="14" r="3" fill="var(--blade,#45d4e3)"/>
  </symbol>

  <!-- CREATURE : 장신 털복숭이 이족보행 (제너릭) -->
  <symbol id="sil-creature" viewBox="0 0 100 130">
    <g fill="currentColor">
      <path d="M42 14 C42 8 58 8 58 14 C63 18 63 32 58 36 C54 40 46 40 42 36 C37 32 37 18 42 14 Z"/>
      <path d="M36 36 L29 44 L34 50 L27 60 L34 67 L29 102 L40 122 L46 100 L46 72 L54 72 L54 100 L60 122 L71 102 L66 67 L73 60 L66 50 L71 44 L64 36 C58 40 42 40 36 36 Z"/>
      <path d="M30 47 L19 82 L28 84 L37 53 Z"/><path d="M70 47 L81 82 L72 84 L63 53 Z"/>
    </g>
    <circle cx="46" cy="23" r="2.4" fill="var(--blade,#45d4e3)"/><circle cx="54" cy="23" r="2.4" fill="var(--blade,#45d4e3)"/>
  </symbol>

  <!-- CIVILIAN : 평범한 튜닉 차림 -->
  <symbol id="sil-civilian" viewBox="0 0 100 130">
    <g fill="currentColor">
      <circle cx="50" cy="24" r="12"/>
      <path d="M34 44 C34 38 66 38 66 44 L70 100 C70 104 66 104 62 104 L38 104 C34 104 30 104 30 100 Z"/>
      <rect x="40" y="102" width="9" height="24" rx="2"/><rect x="51" y="102" width="9" height="24" rx="2"/>
      <path d="M34 48 L27 86 L35 87 L41 52 Z"/><path d="M66 48 L73 86 L65 87 L59 52 Z"/>
    </g>
    <rect x="34" y="70" width="32" height="4" fill="var(--blade,#45d4e3)" opacity=".6"/>
  </symbol>
</svg>

<div class="head">
  <div class="kicker">asset-designer · 오리지널 실루엣 라이브러리</div>
  <h1>아키타입 실루엣 9종</h1>
  <p class="sub">줌인 부각 시 노드 위로 떠오르는 인물 실루엣. <code>characters.json</code>의 <code>portrait.archetype</code>과 1:1로 연결됩니다. <code>currentColor</code> 기반이라 시대·성향 색으로 자유롭게 물들일 수 있어요.</p>
  <p class="note">전부 오리지널 형태입니다 — 디즈니/루카스필름의 실제 헬멧·캐릭터 디자인을 복제하지 않고 아키타입을 일반화했습니다 (헌법 제6조). 카드에 마우스를 올리면 줌 부각 연출(확대+발광)이 미리 보입니다.</p>
</div>

<div class="grid" id="grid"></div>

<script>
const SILS=[
  {k:"jedi",ko:"제다이",tint:"var(--holo)",blade:"#45d4e3",ex:"오비완 · 요다 · 루크"},
  {k:"sith",ko:"시스",tint:"var(--saber)",blade:"#ff5a4d",ex:"베이더 · 시디어스 · 몰"},
  {k:"droid",ko:"드로이드",tint:"#9fb2c8",blade:"#45d4e3",ex:"R2-D2 · C-3PO · IG-88"},
  {k:"trooper",ko:"병사 / 트루퍼",tint:"#c8d2de",blade:"#45d4e3",ex:"클론·제국 병사"},
  {k:"pilot",ko:"파일럿",tint:"var(--amber)",blade:"#f4b740",ex:"웨지 · 빅스 · 포킨스"},
  {k:"bounty",ko:"현상금 사냥꾼",tint:"var(--green)",blade:"#7ee787",ex:"보바 펫 · 장고 펫 · 보스크"},
  {k:"royal",ko:"왕족 · 정치인",tint:"var(--rose)",blade:"#ff79c6",ex:"파드메 · 레이아 · 팰퍼틴"},
  {k:"creature",ko:"외계 종족",tint:"var(--sand)",blade:"#c2a86a",ex:"추바카 · 자바 · 그리도"},
  {k:"civilian",ko:"민간인",tint:"var(--dim)",blade:"#8b97a8",ex:"오웬 · 베루 · 슈미"}
];
const grid=document.getElementById('grid');
SILS.forEach(s=>{
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div class="svgwrap" style="color:${s.tint};--blade:${s.blade}">
      <svg><use href="#sil-${s.k}"/></svg></div>
    <div class="key">${s.k}</div>
    <div class="ko">${s.ko}</div>
    <div class="ex">예) ${s.ex}</div>`;
  grid.appendChild(c);
});
</script>
</body>
</html>
