*{box-sizing:border-box;margin:0;padding:0}

.life-year{font-family:var(--fm,monospace);font-size:11px;color:var(--dim);text-align:right;padding-top:2px;white-space:nowrap}

.life-body{min-width:0}

const RELC={family:{c:"#ff79c6",ko:"가족"},master:{c:"#45d4e3",ko:"사제"},ally:{c:"#7ee787",ko:"동맹"},rival:{c:"#f4b740",ko:"적대"}};
const ARCHSYM={jedi:"sil-jedi",sith:"sil-sith",droid:"sil-droid",trooper:"sil-trooper",pilot:"sil-pilot",bounty:"sil-bounty",royal:"sil-royal",creature:"sil-creature",civilian:"sil-civilian"};
const ARCHKO={jedi:"제다이",sith:"시스",droid:"드로이드",trooper:"병사",pilot:"파일럿",bounty:"현상금 사냥꾼",royal:"왕족·정치인",creature:"외계 종족",civilian:"민간인"};
const GEN={male:"남성",female:"여성",droid:"드로이드","n/a":"드로이드/기타",none:"없음",other:"기타",hermaphrodite:"자웅동체"};
const WORKS={"ep-1-phantom-menace":["I","보이지 않는 위험"],"ep-2-attack-of-clones":["II","클론의 습격"],"ep-3-revenge-of-sith":["III","시스의 복수"],"ep-4-a-new-hope":["IV","새로운 희망"],"ep-5-empire":["V","제국의 역습"],"ep-6-return-of-jedi":["VI","제다이의 귀환"]};
const WORDER=["ep-1-phantom-menace","ep-2-attack-of-clones","ep-3-revenge-of-sith","ep-4-a-new-hope","ep-5-empire","ep-6-return-of-jedi"];
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function getId(){const u=new URLSearchParams(location.search);return u.get("id")||location.hash.replace("#","")||"luke-skywalker";}

function relsOf(id){
  const out={family:[],master:[],ally:[],rival:[]};
  REL.forEach(r=>{
    if(r.s===id)out[r.type].push({id:r.t,dir:r.type==="master"?"제자":null});
    else if(r.t===id)out[r.type].push({id:r.s,dir:r.type==="master"?"스승":null});
  });
  return out;
}
const ERACOL={dawn_of_the_jedi:'#c9b458',high_republic:'#ffd24a',fall_of_the_jedi:'#7aa2ff',reign_of_the_empire:'#ff5a4d',age_of_rebellion:'#ff9a3a',new_republic:'#45d4e3',rise_of_the_first_order:'#c97aff',new_jedi_order:'#8fd44a'};
function render(){
  const d=CH[getId()],app=document.getElementById("app");
  if(!d){app.innerHTML=`<div class="notfound">해당 인물 기록을 찾을 수 없습니다.<br><a class="back" href="galaxy-network.html">← 관계망으로</a></div>`;return;}
  document.title=`${d.name} · 인물 기록`;
  const tint=ALIGN[d.alignment], blade=d.alignment==="dark"?"#ff5a4d":"#45d4e3";
  const fl=WORDER.filter(w=>(d.works||[]).includes(w));
  const appears=Object.values(EVBY).filter(e=>e.characters.includes(d.id)).sort((a,b)=>a.year_value-b.year_value);
  const rel=relsOf(d.id);
  const home=LOC[d.homeworld];
  const sp=d.species?SPECIES[d.species]:null;
  let html=`
  <div class="hud-bar"><a href="timeline.html">스타워즈 캐넌 아카이브</a><span class="sep">//</span><span>CHARACTER</span><span class="sep">//</span><span class="id">${d.id}</span></div>
  <article class="record">
    <span class="corner tl"></span><span class="corner br"></span>
    <div class="kicker">인물 기록 · Character Record</div>
    <div class="dhead">
      ${(d.external_refs&&d.external_refs.databank&&d.external_refs.databank.image_url)?`<figure class="card-official"><img src="${esc(d.external_refs.databank.image_url)}" alt="${esc(d.name)} — 공식 이미지" loading="lazy" referrerpolicy="no-referrer" onerror="this.closest('figure').style.display='none';var s=document.getElementById('silfb');if(s)s.style.display=''"><figcaption>이미지 출처: Star Wars Databank \u00a9 Lucasfilm Ltd.</figcaption></figure><div class="card-sil" id="silfb" style="display:none;color:${tint};--blade:${blade}"><svg><use href="#${ARCHSYM[d.portrait.archetype]}"/></svg></div>`:`<div class="card-sil" style="color:${tint};--blade:${blade}"><svg><use href="#${ARCHSYM[d.portrait.archetype]}"/></svg></div>`}
      <div>
        <span class="align-tag" style="background:${tint}22;color:${tint};border:1px solid ${tint}">${ALIGNKO[d.alignment]}</span>
        <h1 style="font-size:1.9rem">${esc(d.name)}</h1>
        <div class="title-en">${esc(d.name_en)}</div>
        <div class="arch-ko">${ARCHKO[d.portrait.archetype]} · tier ${d.tier}</div>
        <a class="viewbtn" href="galaxy-network.html?focus=${d.id}">관계망에서 보기 ▸</a>
      </div>
    </div>
    <div class="rule"></div>
    <div class="stats">
      <div class="stat"><span class="k">출생</span><span class="v">${d.birth_year||"?"}</span></div>
      <div class="stat"><span class="k">키</span><span class="v">${d.height_cm?d.height_cm+"cm":"?"}</span></div>
      <div class="stat"><span class="k">몸무게</span><span class="v">${d.mass_kg?d.mass_kg+"kg":"?"}</span></div>
      <div class="stat"><span class="k">성별</span><span class="v">${GEN[d.gender]||d.gender}</span></div>
      ${sp?`<div class="stat"><span class="k">종족</span><span class="v">${esc(sp.ko)}</span></div>`:(d.species?`<div class="stat"><span class="k">종족</span><span class="v">${esc(d.species)}</span></div>`:"")}
      <div class="stat"><span class="k">고향</span><span class="v">${home?`<a href="location-detail.html?id=${d.homeworld}" style="color:var(--holo);text-decoration:none">${esc(home)}</a>`:(d.homeworld||"불명")}</span></div>
      <div class="stat"><span class="k">등장</span><span class="v">${appears.length}개 사건</span></div>
    </div>`;
  const aff=d.affiliation_history||[];
  if(aff.length){
    html+=`<div class="sec-label">소속 · Affiliation</div><div class="chips">`+aff.map(a=>{
      const fn=FACMAP[a.faction]||a.faction;
      const per=(a.from_event&&EVBY[a.from_event]?EVBY[a.from_event].year_label:"")+(a.to_event&&EVBY[a.to_event]?` ~ ${EVBY[a.to_event].year_label}`:(a.from_event&&EVBY[a.from_event]?" ~":""));
      return `<a class="chip" href="faction-detail.html?id=${a.faction}"><span class="nm">${esc(fn)}</span>${per?`<span class="ref">${esc(per)}</span>`:""}</a>`;
    }).join("")+`</div>`;
  }
  if(d.profile){
    html+=`<div class="sec-label">프로필 · Profile</div><p class="sec-body">${esc(d.profile)}</p>`;
  }
  if(d.motivation){
    html+=`<div class="sec-label">동기 · Motivation</div><p class="sec-body">${esc(d.motivation)}</p>`;
  }
  if(!d.motivation){
    html+=`<div class="sec-body dim" style="margin-top:6px;font-style:italic">심층 서사(동기·변화)는 인물 프로파일러가 아직 작성하지 않았습니다.</div>`;
  }
  html+=`<div class="rule"></div><div class="sec-label">관계 · Relationships</div>`;
  let any=false;
  Object.keys(RELC).forEach(t=>{
    if(!rel[t].length)return; any=true;
    html+=`<div class="rel-group"><div class="lbl" style="color:${RELC[t].c}"><span class="bar" style="background:${RELC[t].c}"></span>${RELC[t].ko} ${rel[t].length}</div><div class="chips">`;
    html+=rel[t].map(n=>`<a class="chip" href="?id=${n.id}">${esc(CH[n.id]?CH[n.id].name:n.id)}${n.dir?`<span class="rel-dir"> ${n.dir==="제자"?"→ 제자":"← 스승"}</span>`:""}</a>`).join("");
    html+=`</div></div>`;
  });
  if(!any)html+=`<p class="sec-body dim">기록된 관계가 없습니다.</p>`;

  const noteMap={};
  (d.arc||[]).forEach(a=>{if(a.event)noteMap[a.event]={note:a.note,kind:"arc"};});
  (d.key_choices||[]).forEach(a=>{if(a.event)noteMap[a.event]={note:a.note,kind:"choice"};});
  const lifeIds=new Set(appears.map(e=>e.id));
  Object.keys(noteMap).forEach(id=>{if(EVBY[id])lifeIds.add(id);});
  const life=[...lifeIds].map(id=>EVBY[id]).filter(Boolean).sort((a,b)=>(a.year_value??0)-(b.year_value??0));
  html+=`<div class="rule"></div><div class="sec-label">생애 연대기 · Lifeline (${life.length})</div>`;
  html+= life.length?`<div class="lifeline">`+life.map(e=>{
    const erk=ERA[e.era]||"", erc=ERACOL[e.era]||"#5a6473", nm=noteMap[e.id];
    return `<div class="life-row"><div class="life-year">${esc(e.year_label||"")}</div><div class="life-dot" style="--ec:${erc}"></div><div class="life-body"><a class="life-ev" href="event-detail.html?id=${e.id}">${esc(e.title)}</a><span class="era-badge" style="--ec:${erc}">${erk}</span>${nm?`<div class="life-note ${nm.kind}" style="--ec:${erc}">${nm.kind==="choice"?"◆ ":"★ "}${esc(nm.note)}</div>`:""}</div></div>`;
  }).join("")+`</div>`:`<p class="sec-body dim">events.json에서 직접 참조된 사건이 없습니다.</p>`;

  if(fl.length){html+=`<div class="sec-label" style="margin-top:18px">출연작 · Filmography</div>`+fl.map(w=>`<a class="film-tag" href="film-detail.html?id=${w}"><b>${WORKS[w][0]}</b> ${WORKS[w][1]}</a>`).join("");}
  const myveh=VEH.filter(v=>(v.pilots||[]).includes(d.id));
  if(myveh.length){html+=`<div class="sec-label" style="margin-top:18px">조종한 탈것 · Vehicles</div>`+myveh.map(v=>`<a class="film-tag" href="vehicle-detail.html?id=${v.id}">${v.name}</a>`).join("");}
  const myss=SS.filter(v=>(v.pilots||[]).includes(d.id));
  if(myss.length){html+=`<div class="sec-label" style="margin-top:18px">조종한 함선 · Starships</div>`+myss.map(v=>`<a class="film-tag" href="starship-detail.html?id=${v.id}">${v.name}</a>`).join("");}

    if(sp){html+=`<div class="sec-label" style="margin-top:18px">종족 · Species</div><div class="readout"><div><span class="k">종족</span><span class="v">${esc(sp.ko)} (${esc(d.species)})</span></div><div><span class="k">분류</span><span class="v">${esc(sp.cls)}</span></div><div><span class="k">언어</span><span class="v">${esc(sp.lang)}</span></div><div><span class="k">평균 수명</span><span class="v">${sp.life==='unknown'?'불명':esc(sp.life)+(/^[0-9]+$/.test(sp.life)?'년':'')}</span></div></div>`;}
  html+=`<div class="srcline" style="margin-top:14px">출처 · <b>${esc(d.source)}</b> · ${d.source_type} · canon ${d.canon_status}</div>
    <div class="legend-hint">동기·변화·결정적 선택 = 인물 프로파일러(제3·6조) · 관계 = 관계 추출자(제4조) · 등장 사건 = events.json 역참조 · 실루엣 = asset-designer(제6조).</div>
  </article>
  <div class="nav"><a href="galaxy-network.html"><div class="dir">← 인물 관계망</div><div class="t">전체 인물 보기</div></a><a class="next" href="timeline.html"><div class="dir">타임라인 →</div><div class="t">사건 연대기</div></a></div>
  <a class="back" href="timeline.html">← 전체 타임라인으로</a>`;
  app.innerHTML=html;window.scrollTo(0,0);
}
async function load(){try{
  const [cs,rl,ev,lo,fa,vh,ss]=await Promise.all([fetch("characters.json").then(r=>r.json()),fetch("relations.json").then(r=>r.json()),fetch("events.json").then(r=>r.json()),fetch("locations.json").then(r=>r.json()),fetch("factions.json").then(r=>r.json()),fetch("vehicles.json").then(r=>r.json()).catch(()=>[]),fetch("starships.json").then(r=>r.json()).catch(()=>[])]);
  CH=Object.fromEntries(cs.map(c=>[c.id,c]));REL=rl;EVBY=Object.fromEntries(ev.map(e=>[e.id,e]));LOC=Object.fromEntries(lo.map(l=>[l.id,l.name]));FACMAP=Object.fromEntries(fa.map(f=>[f.id,f.name]));VEH=vh||[];SS=ss||[];render();
}catch(err){document.getElementById("app").innerHTML=`<div class="notfound"><div style="font-family:var(--fd);font-size:1.1rem;color:var(--ink);margin-bottom:14px">데이터 파일을 불러오지 못했습니다</div>characters·relations·events·locations.json을 직접 읽습니다 (헌법 제2조).<br>더블클릭은 file:// 보안정책에 막힙니다. 로컬 서버로 열어주세요:<br><br><code style="color:var(--holo);font-family:var(--fm)">python3 -m http.server</code></div>`;}}
window.addEventListener("popstate",render);
document.addEventListener("click",e=>{const a=e.target.closest('a[href^="?id="]');if(a){e.preventDefault();history.pushState({},"",a.getAttribute("href"));render();}});
load();
</script>
</body></html>
