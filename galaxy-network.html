  .on('zoom',e=>{zt=e.transform;viewport.attr('transform',zt);drawLinks();updateLOD();});
svg.call(zoomB);
function zoomToNode(id){const n=nodeById.get(id);if(!n||n.x==null)return;const k=3.2;svg.transition().duration(820).call(zoomB.transform,d3.zoomIdentity.translate(W/2-k*n.x,H/2-k*n.y).scale(k));}
function nbAll(id){const s=new Set(nbT.get(id).map(n=>n.id));if(showCoapp)nbC.get(id).forEach(x=>s.add(x));return s;}
function applyVisual(){
  g.transition().duration(220).style('opacity',d=>{if(!selected)return 1;if(d.id===selected)return 1;return nbAll(selected).has(d.id)?.95:.12;});
  g.select('text').attr('fill',d=>(selected&&d.id===selected)?'var(--ink)':'var(--dim)');
}
function select(id){selected=id;applyVisual();updateLOD();if(!id){detail.classList.remove('show');return;}showDetail(nodeById.get(id));}
function showDetail(d){
  const groups={family:[],master:[],ally:[],rival:[]};
  nbT.get(d.id).forEach(n=>groups[n.type].push(n));
  const tint=ALIGN[d.align], fl=FORDER.filter(f=>d.films.includes(f));
  let html=`<div class="dhead"><div class="card-sil" style="color:${tint};--blade:${d.align==='dark'?'#ff5a4d':'#45d4e3'}"><svg><use href="#${ARCHSYM[d.arch]}"/></svg></div><div>
    <span class="align-tag" style="background:${tint.replace('var(--','rgba(0,0,0,0)')};color:${tint};border:1px solid ${tint}">${ALIGNKO[d.align]}</span>
    <div class="name">${d.kr}</div><div class="name-en">${d.en}</div><div class="arch-ko">${ARCHKO[d.arch]}</div></div></div>
    <div class="stats">
      <div class="stat"><span class="k">출생</span><span class="v">${d.b==='unknown'?'?':d.b}</span></div>
      <div class="stat"><span class="k">키</span><span class="v">${d.h==='unknown'?'?':d.h+'cm'}</span></div>
      <div class="stat"><span class="k">몸무게</span><span class="v">${d.m==='unknown'?'?':d.m+'kg'}</span></div>
      <div class="stat"><span class="k">성별</span><span class="v">${GEN[d.g]||d.g}</span></div>
      <div class="stat"><span class="k">고향</span><span class="v">${d.home}</span></div>
      <div class="stat"><span class="k">출연</span><span class="v">${d.films.length}편</span></div></div>
    <div class="fb-label">출연작</div>${fl.map(f=>`<span class="film-tag"><b>${FILMS[f].ep}</b> ${FILMS[f].t}</span>`).join('')}`;
  Object.keys(REL).forEach(type=>{if(!groups[type].length)return;
    html+=`<div class="rel-group" style="margin-top:12px"><div class="lbl" style="color:${REL[type].c}"><span class="bar" style="background:${REL[type].c}"></span>${REL[type].ko} ${groups[type].length}</div>`;
    html+=groups[type].map(n=>{let dir="";if(type==="master")dir=n.role==="master"?'<span class="rel-dir"> → 제자</span>':'<span class="rel-dir"> ← 스승</span>';return `<span class="chip" data-id="${n.id}">${nodeById.get(n.id).kr}${dir}</span>`;}).join('')+`</div>`;});
  const cc=nbC.get(d.id).size;
  html+=`<div class="conns"><div class="fb-label">공동출연 ${cc}명</div>${[...nbC.get(d.id)].sort((a,b)=>nbC.get(b).size-nbC.get(a).size).slice(0,10).map(id=>`<span class="chip" data-id="${id}">${nodeById.get(id).kr}</span>`).join('')}${cc>10?`<span class="chip" style="cursor:default;opacity:.5">+${cc-10}</span>`:''}</div>`;
  detail.innerHTML=html;detail.classList.add('show');
  detail.querySelectorAll('.chip[data-id]').forEach(c=>c.onclick=()=>select(c.dataset.id));
}
const relBtns=document.getElementById('relBtns');
Object.keys(REL).forEach(type=>{const b=document.createElement('button');b.className='rel-btn';
  b.innerHTML=`<span class="bar" style="background:${REL[type].c};color:${REL[type].c}"></span><span>${REL[type].ko}</span>`;
  b.onclick=()=>{if(activeTypes.has(type)){activeTypes.delete(type);b.classList.add('off');}else{activeTypes.add(type);b.classList.remove('off');}updateFooter();};
  relBtns.appendChild(b);});
document.getElementById('coappBtn').onclick=function(){showCoapp=!showCoapp;this.classList.toggle('off',!showCoapp);if(selected)applyVisual();updateFooter();};
document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();if(!q){select(null);return;}const hit=nodes.find(n=>n.kr.toLowerCase().includes(q)||n.en.toLowerCase().includes(q));if(hit)select(hit.id);});
function updateFooter(){const tl=typed.filter(l=>activeTypes.has(l.type)).length;document.getElementById('footer').innerHTML=`인물 <b>82</b> · 관계선 <b>${tl}</b>${showCoapp?` · 공동출연 <b>${coapp.length}</b>`:''} · 타입 <b>${activeTypes.size}/4</b>`;}
updateFooter();updateLOD();
const _f=new URLSearchParams(location.search).get('focus');if(_f&&nodeById.get(_f)){setTimeout(()=>{select(_f);zoomToNode(_f);},900);}
window.addEventListener('resize',()=>{resize();sim.force('center',d3.forceCenter(W/2,H/2));sim.alpha(.2).restart();});
</script></body></html>
