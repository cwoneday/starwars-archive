<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작품 기록 · FILM RECORD</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Spline+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--void:#04060b;--base:#080c14;--panel:#0e131c;--elevated:#141b27;--ink:#dce4ee;--dim:#8b97a8;--faint:#515c6b;
--line:rgba(120,140,180,.14);--holo:#45d4e3;--warn:#ff5a4d;--amber:#f4b740;
--fd:'Chakra Petch',sans-serif;--fb:'Spline Sans',sans-serif;--fm:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:radial-gradient(1100px 600px at 50% -8%,#0a1018,transparent 60%),var(--void);color:var(--ink);font-family:var(--fb);min-height:100vh;line-height:1.6}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,rgba(69,212,227,.025) 0 1px,transparent 1px 3px);opacity:.5}
.wrap{max-width:780px;margin:0 auto;padding:28px 22px 80px;position:relative;z-index:2}
.hud-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-family:var(--fm);font-size:11px;color:var(--dim);letter-spacing:.08em;margin-bottom:20px}
.hud-bar .sep{color:var(--faint)}.hud-bar .id{color:var(--holo)}
.hud-bar a{color:var(--dim);text-decoration:none;border-bottom:1px dashed var(--line)}.hud-bar a:hover{color:var(--holo)}
.record{position:relative;background:linear-gradient(180deg,var(--panel),var(--base));border:1px solid var(--line);border-radius:12px;padding:34px 30px;transition:opacity .4s}
.corner{position:absolute;width:18px;height:18px;border:1.5px solid var(--holo);opacity:.55}
.corner.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}.corner.br{bottom:-1px;right:-1px;border-left:0;border-top:0}
.kicker{font-family:var(--fm);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--holo);margin-bottom:10px}
h1{font-family:var(--fd);font-weight:700;font-size:2.1rem;line-height:1.12;letter-spacing:.01em}
.title-en{font-family:var(--fm);font-size:12px;color:var(--faint);margin-top:5px;letter-spacing:.04em}
.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.badge{font-family:var(--fm);font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--line);color:var(--dim);background:rgba(255,255,255,.02)}
.badge.year{color:var(--ink);border-color:var(--holo)}.badge.year b{font-family:var(--fd);color:var(--holo)}
.badge.canon{color:var(--amber)}
.rule{height:1px;background:linear-gradient(90deg,var(--holo),transparent);margin:22px 0;opacity:.4}
.one-liner{font-family:var(--fd);font-size:1.15rem;font-weight:500;color:var(--ink);border-left:2px solid var(--holo);padding-left:14px;margin:4px 0 0}
.readout{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin:20px 0;padding:14px;background:var(--void);border:1px solid var(--line);border-radius:8px}
.readout>div{display:flex;justify-content:space-between;font-family:var(--fm);font-size:11px;border-bottom:1px solid var(--line);padding-bottom:5px}
.readout .k{color:var(--faint)}.readout .v{color:var(--holo)}
.sec-label{font-family:var(--fm);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin:24px 0 9px}
.belli{display:flex;align-items:stretch;gap:10px;margin:6px 0}
.belli .side{flex:1;background:var(--void);border:1px solid var(--line);border-radius:8px;padding:11px}
.belli .side .sl{font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--faint);margin-bottom:6px}
.belli .vs{display:flex;align-items:center;font-family:var(--fd);font-weight:700;color:var(--warn);font-size:13px}
.belli .fac{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink);margin-bottom:4px}.emb-mini{width:18px;height:18px;flex:none;filter:drop-shadow(0 0 3px currentColor)}
.outcome{font-family:var(--fd);font-weight:600;color:var(--holo);font-size:1rem;border-left:2px solid var(--holo);padding-left:12px;margin:4px 0}
.kfig{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.dd{counter-reset:phase;margin-top:4px}
.dd .step{position:relative;padding-left:34px;padding-bottom:16px;border-left:1px solid var(--line);margin-left:10px}
.dd .step:last-child{border-left-color:transparent;padding-bottom:0}
.dd .step::before{counter-increment:phase;content:counter(phase);position:absolute;left:-11px;top:0;width:22px;height:22px;border-radius:50%;background:var(--void);border:1px solid var(--holo);color:var(--holo);font-family:var(--fm);font-size:11px;display:flex;align-items:center;justify-content:center}
.dd .ph{font-family:var(--fd);font-weight:600;color:var(--ink);font-size:.98rem;margin-bottom:3px}
.dd .nt{font-size:.92rem;color:var(--dim);line-height:1.6}
.sec-body{font-size:1rem;color:var(--ink)}.sec-body.dim{color:var(--dim)}
.chip-group{margin-bottom:14px}.grp-label{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;flex-direction:column;gap:1px;padding:6px 10px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.02);text-decoration:none;transition:all .15s}
a.chip:hover{border-color:var(--holo);transform:translateY(-1px)}
.chip .nm{font-size:12px;color:var(--ink)}.chip .ref{font-family:var(--fm);font-size:9px;color:var(--faint)}
.chip.pending{opacity:.55}.chip.pending .nm{color:var(--dim)}
.srcline{font-family:var(--fm);font-size:11px;color:var(--dim);margin-top:6px}.srcline b{color:var(--ink);font-weight:500}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tag{font-family:var(--fm);font-size:10px;color:var(--holo);background:rgba(69,212,227,.07);border:1px solid var(--line);border-radius:20px;padding:3px 10px}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}
.nav a{flex:1;text-decoration:none;border:1px solid var(--line);border-radius:9px;padding:12px 14px;background:rgba(255,255,255,.02);transition:all .15s;min-width:0}
.nav a:hover{border-color:var(--holo);background:rgba(69,212,227,.05)}
.nav .dir{font-family:var(--fm);font-size:10px;color:var(--faint);letter-spacing:.1em}
.nav .t{font-family:var(--fd);font-size:14px;color:var(--ink);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav .next{text-align:right}
.back{display:inline-block;margin-top:22px;font-family:var(--fm);font-size:12px;color:var(--holo);text-decoration:none;border-bottom:1px dashed var(--holo)}
.notfound{text-align:center;padding:80px 20px;color:var(--dim)}
.legend-hint{font-family:var(--fm);font-size:10px;color:var(--faint);margin-top:18px;line-height:1.7;border-top:1px solid var(--line);padding-top:14px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:4px}
.prod-grid .pd{background:var(--void);border:1px solid var(--line);border-radius:8px;padding:9px 11px;display:flex;flex-direction:column;gap:3px}
.prod-grid .pk{font-family:var(--fm);font-size:9px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase}
.prod-grid .pv{font-size:13px;color:var(--ink)}.xref{color:var(--holo);text-decoration:none;border-bottom:1px dashed rgba(69,212,227,.5)}
.xref:hover{border-bottom-style:solid;text-shadow:0 0 6px var(--holo-glow,rgba(69,212,227,.4))}
</style></head>

.site-nav{position:fixed;top:0;left:0;right:0;height:46px;z-index:3000;display:flex;align-items:center;gap:16px;padding:0 18px;background:rgba(6,9,15,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(120,140,180,.16);font-family:'JetBrains Mono',monospace;box-sizing:border-box}

<main class="wrap" id="app"></main>
<script>
const ERA_KO={dawn_of_the_jedi:"제다이의 여명",high_republic:"하이 리퍼블릭",fall_of_the_jedi:"제다이의 몰락",reign_of_the_empire:"제국의 시대",age_of_rebellion:"반란의 시대",new_republic:"뉴 리퍼블릭",rise_of_the_first_order:"퍼스트 오더의 부상",new_jedi_order:"뉴 제다이 오더"};
const TRI_KO={prequel:"프리퀄 3부작",original:"오리지널 3부작",sequel:"시퀄 3부작",none:"단독"};
const ALIGN_KO={light:"라이트",dark:"다크",neutral:"중립"};
const EMBC2={light:"#5aa9ff",dark:"#ff5a4d",neutral:"#c2a86a"};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const ERABG={dawn_of_the_jedi:{g:["#1a2a3a","#0a1118"],a:[0.15,0.45,0.5]},high_republic:{g:["#3a3320","#15110a"],a:[0.6,0.5,0.2]},fall_of_the_jedi:{g:["#2a2230","#120a14"],a:[0.55,0.35,0.2]},reign_of_the_empire:{g:["#0d1622","#070b12"],a:[0.25,0.34,0.45]},age_of_rebellion:{g:["#16233a","#0a1018"],a:[0.2,0.45,0.7]},new_republic:{g:["#16302a","#0a1812"],a:[0.2,0.55,0.45]},rise_of_the_first_order:{g:["#2a0d0d","#120708"],a:[0.7,0.18,0.12]},new_jedi_order:{g:["#1a2740","#0a1322"],a:[0.4,0.55,0.7]}};
const STARS=(()=>{let r=7,out="";const rnd=()=>{r=(r*9301+49297)%233280;return r/233280};for(let i=0;i<26;i++){out+=`<circle cx="${(rnd()*1200)|0}" cy="${(rnd()*800)|0}" r="${(rnd()*1.4+0.5).toFixed(1)}" fill="#eaf2ff" opacity="${(rnd()*0.5+0.3).toFixed(2)}"/>`}return out})();
function eraBackdrop(era){const c=ERABG[era]||ERABG.age_of_rebellion;const[ar,ag,ab]=c.a;return `<svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice"><defs><radialGradient id="eg" cx="35%" cy="28%" r="90%"><stop offset="0%" stop-color="${c.g[0]}"/><stop offset="55%" stop-color="${c.g[1]}"/><stop offset="100%" stop-color="#04060b"/></radialGradient><filter id="ef"><feTurbulence type="fractalNoise" baseFrequency="0.006 0.009" numOctaves="3" seed="9"/><feColorMatrix type="matrix" values="0 0 0 0 ${ar}  0 0 0 0 ${ag}  0 0 0 0 ${ab}  0 0 0 0.5 0"/></filter></defs><rect width="1200" height="800" fill="url(#eg)"/><rect width="1200" height="800" filter="url(#ef)" opacity="0.32"/>${STARS}</svg>`;}

let FILMS=[],BYID={},CHARS=[],EVENTS=[],VEHS=[],SSS=[],LOCS=[],FACS=[];
// 제6조-B: 서술 안의 데이터 이름을 상세 페이지로 자동 링크
let LINK_INDEX=[], LINK_RE=null, LINK_MAP={};
function buildLinkIndex(){
  const idx=[];
  const add=(name,url)=>{ if(name && String(name).length>=2) idx.push({name:String(name),url}); };
  EVENTS.forEach(e=>add(e.title,`event-detail.html?id=${e.id}`));
  CHARS.forEach(c=>add(c.name,`character-detail.html?id=${c.id}`));
  LOCS.forEach(l=>add(l.name,`location-detail.html?id=${l.id}`));
  FACS.forEach(x=>add(x.name,`faction-detail.html?id=${x.id}`));
  VEHS.forEach(v=>add(v.name,`vehicle-detail.html?id=${v.id}`));
  SSS.forEach(v=>add(v.name,`starship-detail.html?id=${v.id}`));
  // 긴 이름 우선 (부분 매칭 방지)
  idx.sort((a,b)=>b.name.length-a.name.length);
  LINK_INDEX=idx; LINK_MAP={}; idx.forEach(o=>{ if(!(o.name in LINK_MAP)) LINK_MAP[o.name]=o.url; });
  const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const seen=new Set(); const alts=[];
  idx.forEach(o=>{ if(!seen.has(o.name)){ seen.add(o.name); alts.push(esc(o.name)); }});
  LINK_RE = alts.length ? new RegExp(alts.join('|'),'g') : null;
}
// escapedText(이미 HTML 이스케이프됨) 안의 이름을 링크로
function linkify(escapedText){
  if(!LINK_RE) return escapedText;
  return escapedText.replace(LINK_RE,(m,offset,str)=>{
    const prev=str[offset-1]||"", next=str[offset+m.length]||"";
    // 〈 〉 《 》 안의 작품명 표기는 링크하지 않음 (예: 마블 〈다스 베이더〉)
    if(prev==="\u3008"||next==="\u3009"||prev==="\u300A"||next==="\u300B") return m;
    return LINK_MAP[m] ? `<a class="xref" href="${LINK_MAP[m]}">${m}</a>` : m;
  });
}
const getId=()=>new URLSearchParams(location.search).get('id');

async function load(){
  try{
    const [fi,ch,ev,vh,ss,lo,fa]=await Promise.all(["films.json","characters.json","events.json","vehicles.json","starships.json","locations.json","factions.json"].map(f=>fetch(f).then(r=>r.json()).catch(()=>[])));
    FILMS=fi; CHARS=ch; EVENTS=ev; VEHS=vh||[]; SSS=ss||[]; LOCS=lo||[]; FACS=fa||[]; BYID=Object.fromEntries(fi.map(f=>[f.id,f]));
    buildLinkIndex();
    render();
  }catch(err){
    document.getElementById("app").innerHTML=`<div class="notfound"><div style="font-family:var(--fd);font-size:1.1rem;color:var(--ink);margin-bottom:14px">데이터를 불러오지 못했습니다</div>films/characters/events.json을 직접 읽습니다. 로컬 서버/GitHub Pages로 열어주세요:<br><br><code style="color:var(--holo);font-family:var(--fm)">python3 -m http.server</code></div>`;
  }
}
function render(){
  const f=BYID[getId()], app=document.getElementById("app");
  if(!f){ app.innerHTML=`<div class="hud-bar"><a href="timeline.html">스타워즈 캐넌 아카이브</a><span class="sep">//</span><span>FILM RECORD</span></div><div class="notfound">해당 작품을 찾을 수 없습니다.<br><a class="back" href="timeline.html">← 타임라인으로</a></div>`; return; }
  document.title=`${f.title} · 작품 기록`;
  document.getElementById("eraBg").innerHTML=eraBackdrop(f.era_primary||"age_of_rebellion");

  const chars=CHARS.filter(c=>(c.works||[]).includes(f.id)).sort((a,b)=>(a.tier-b.tier)||a.name.localeCompare(b.name,"ko"));
  const evs=EVENTS.filter(e=>e.work===f.id).sort((a,b)=>a.year_value-b.year_value);
  const prev=FILMS.find(x=>x.episode_number===f.episode_number-1);
  const next=FILMS.find(x=>x.episode_number===f.episode_number+1);

  const charChips=chars.length?chars.map(c=>{const a=ALIGN_KO[c.alignment]?EMBC2[c.alignment]:"var(--dim)";return `<a class="chip" href="character-detail.html?id=${c.id}"><span class="dot" style="background:${EMBC2[c.alignment]||'var(--faint)'}"></span><span class="nm">${esc(c.name)}</span></a>`;}).join(""):'<span class="empty">등록된 등장인물이 아직 없습니다.</span>';
  const evChips=evs.length?evs.map(e=>`<a class="chip ev" href="event-detail.html?id=${e.id}"><span class="yr">${esc(e.year_label)}</span><span class="nm">${esc(e.title)}</span></a>`).join(""):'<span class="empty">연결된 사건이 아직 없습니다.</span>';

  app.innerHTML=`
    <div class="hud-bar"><a href="timeline.html">스타워즈 캐넌 아카이브</a><span class="sep">//</span><span>FILM RECORD</span></div>
    <div class="kicker">작품 기록 · Film Record</div>
    <h1 style="font-size:1.9rem;margin:2px 0 2px">${esc(f.title)}</h1>
    <div class="title-en">${esc(f.title_en)}</div>
    <div class="badges">
      ${f.episode_number?`<span class="badge holo">EPISODE ${f.episode_number}</span>`:""}
      ${f.trilogy?`<span class="badge">${esc(TRI_KO[f.trilogy]||f.trilogy)}</span>`:""}
      ${f.release_year?`<span class="badge">${f.release_year}</span>`:""}
      ${f.era_primary?`<span class="badge">${esc(ERA_KO[f.era_primary]||f.era_primary)}</span>`:""}
      <span class="badge dim">${esc(f.canon_status)}</span>
    </div>
    ${(f.director||f.producer||f.author||f.publisher||f.release_date)?`<div class="sec-label">제작·출간 정보 · Credits</div><div class="prod-grid">
      ${f.director?`<div class="pd"><span class="pk">감독 · Director</span><span class="pv">${esc(f.director)}</span></div>`:""}
      ${f.author?`<div class="pd"><span class="pk">저자 · Author</span><span class="pv">${esc(f.author)}</span></div>`:""}
      ${f.producer?`<div class="pd"><span class="pk">제작 · Producer</span><span class="pv">${esc(f.producer)}</span></div>`:""}
      ${f.publisher?`<div class="pd"><span class="pk">출판 · Publisher</span><span class="pv">${esc(f.publisher)}</span></div>`:""}
      ${f.release_date?`<div class="pd"><span class="pk">${f.work_type==="novel"?"발행일 · Published":"개봉일 · Released"}</span><span class="pv">${esc(f.release_date)}</span></div>`:""}
    </div>`:""}
    <div class="sec-label">줄거리 · Summary</div><p class="sec-body">${linkify(esc(f.summary))}</p>
    ${f.significance?`<div class="sec-label">의의 · Significance</div><p class="sec-body dim">${linkify(esc(f.significance))}</p>`:""}
    <div class="sec-label">등장인물 · Characters <span class="cnt">(${chars.length})</span></div><div class="chips">${charChips}</div>
    <div class="sec-label">수록 사건 · Events <span class="cnt">(${evs.length})</span></div><div class="chips">${evChips}</div>
    ${(()=>{const vs=VEHS.filter(v=>(v.films||[]).includes(f.id));return vs.length?`<div class="sec-label">등장 탈것 · Vehicles <span class="cnt">(${vs.length})</span></div><div class="chips">${vs.map(v=>`<a class="chip" href="vehicle-detail.html?id=${v.id}">${esc(v.name)}</a>`).join("")}</div>`:"";})()}
    ${(()=>{const vs=SSS.filter(v=>(v.films||[]).includes(f.id));return vs.length?`<div class="sec-label">등장 함선 · Starships <span class="cnt">(${vs.length})</span></div><div class="chips">${vs.map(v=>`<a class="chip" href="starship-detail.html?id=${v.id}">${esc(v.name)}</a>`).join("")}</div>`:"";})()}
    ${(f.tags&&f.tags.length)?`<div class="sec-label">태그 · Tags</div><div class="tags">${f.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}</div>`:""}
    <div class="filmnav">
      ${prev?`<a class="back" href="film-detail.html?id=${prev.id}">← EP${prev.episode_number} ${esc(prev.title)}</a>`:'<span></span>'}
      ${next?`<a class="back" href="film-detail.html?id=${next.id}">EP${next.episode_number} ${esc(next.title)} →</a>`:'<span></span>'}
    </div>
    <a class="back" href="timeline.html" style="margin-top:18px">← 타임라인으로</a>`;
}
load();
</script>
<style>
.title-en{font-family:var(--fm);font-size:12px;color:var(--dim);letter-spacing:.06em;margin-bottom:12px}
.badges{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.badge{font-family:var(--fm);font-size:10px;letter-spacing:.06em;padding:4px 9px;border:1px solid var(--line);border-radius:20px;color:var(--ink)}
.badge.holo{color:var(--holo);border-color:rgba(69,212,227,.4)}.badge.dim{color:var(--faint)}
.cnt{color:var(--faint);font-size:10px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--line);border-radius:8px;text-decoration:none;color:var(--ink);font-size:13px;background:var(--void)}
.chip:hover{border-color:var(--holo)}
.chip .dot{width:8px;height:8px;border-radius:50%;flex:none}
.chip.ev .yr{font-family:var(--fm);font-size:10px;color:var(--dim)}
.empty{color:var(--faint);font-size:13px}
.filmnav{display:flex;justify-content:space-between;gap:12px;margin-top:26px;flex-wrap:wrap}
.filmnav .back{margin:0}
.tags{display:flex;flex-wrap:wrap;gap:6px}.tag{font-family:var(--fm);font-size:11px;color:var(--dim)}
</style>
</body></html>
