name: preflight
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: 통합 사전검사 (데이터 + JS + 매핑)
        run: python3 preflight.py
