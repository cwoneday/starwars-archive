<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>유물 기록 — 스타워즈 캐넌 아카이브</title>
<style>
:root{--bg:#04060b;--ink:#e8edf4;--dim:#8b97a8;--holo:#45d4e3;--amber:#ffb454;--line:rgba(120,140,180,.16);--panel:rgba(10,15,24,.7)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;min-height:100vh}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,rgba(69,212,227,.025) 0 1px,transparent 1px 3px);opacity:.5}
.site-nav{position:fixed;top:0;left:0;right:0;height:46px;z-index:3000;display:flex;align-items:center;gap:16px;padding:0 18px;background:rgba(6,9,15,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);font-family:ui-monospace,monospace;box-sizing:border-box}
.site-nav .brand{color:var(--holo);font-weight:700;font-size:12px;letter-spacing:.12em;text-decoration:none;white-space:nowrap}
.site-nav .links{display:flex;gap:4px;flex-wrap:wrap;overflow:hidden}
.site-nav .links a{color:var(--dim);font-size:12px;text-decoration:none;padding:6px 11px;border-radius:6px;white-space:nowrap}
.site-nav .links a:hover{color:#dce4ee;background:rgba(255,255,255,.06)}.site-nav .links a.active{color:var(--holo);background:rgba(69,212,227,.10)}
.site-nav .nav-search{color:var(--holo);border:1px solid rgba(69,212,227,.55);border-radius:20px;padding:3px 13px;background:rgba(69,212,227,.10);font-weight:600}
@media(max-width:560px){.site-nav{gap:8px;padding:0 10px}.site-nav .brand{font-size:10px}.site-nav .links a{font-size:10px;padding:5px 7px}}
.wrap{max-width:720px;margin:0 auto;padding:74px 18px 60px;position:relative;z-index:2}
.back{display:inline-block;color:var(--dim);text-decoration:none;font-size:12px;margin-bottom:14px}.back:hover{color:var(--holo)}
.tbadge{display:inline-block;font-size:10px;font-weight:700;color:var(--tc);border:1px solid var(--tc);border-radius:20px;padding:2px 10px}
h1{font-size:2rem;margin:8px 0 2px}.en{font-size:12px;color:var(--dim)}
.desc{font-size:14px;line-height:1.75;color:#d2dae4;margin:16px 0;border-left:3px solid var(--tc);padding-left:14px}
.sec{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--holo);text-transform:uppercase;margin:26px 0 14px}
.prov{position:relative}
.prow{display:grid;grid-template-columns:84px 18px 1fr;gap:10px;align-items:start;padding:10px 0;position:relative}
.prow:not(:last-child)::after{content:"";position:absolute;left:91px;top:22px;bottom:-10px;width:2px;background:linear-gradient(var(--tc),rgba(120,140,180,.2))}
.pyear{font-family:ui-monospace,monospace;font-size:11px;color:var(--dim);text-align:right;padding-top:3px;white-space:nowrap}
.pdot{width:13px;height:13px;border-radius:50%;background:var(--tc);box-shadow:0 0 9px var(--tc);margin-top:4px;justify-self:center;z-index:1}
.pdot.last{background:#fff;box-shadow:0 0 9px #fff}
.pholder{font-size:15px;font-weight:700}.pholder a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--tc)}.pholder a:hover{color:var(--holo)}
.pnote{font-size:12.5px;color:#cdd6e2;line-height:1.6;margin-top:4px}
.pev{display:inline-block;font-size:10.5px;color:var(--holo);text-decoration:none;margin-top:5px;border:1px solid rgba(69,212,227,.4);border-radius:20px;padding:1px 9px}
.fate{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 17px;margin-top:24px;font-size:13.5px;line-height:1.7}
.fate b{color:var(--tc)}
.srcline{margin-top:20px;font-size:12px;color:var(--dim)}.srcline b{color:#cdd6e2}
.ahero{display:flex;gap:18px;align-items:center;margin-top:6px}
.ahero .vis{width:88px;height:88px;flex:none;filter:drop-shadow(0 0 9px var(--tc))}
.ahero figure{margin:0;flex:none}.ahero figure img{width:100px;height:100px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
.ahero figcaption{font-size:9px;color:var(--dim);margin-top:3px;max-width:100px;line-height:1.3}
</style></head><body>
<nav class="site-nav"><a class="brand" href="index.html">✦ 캐넌 아카이브</a><div class="links"><a href="search.html" class="nav-search">⌕ 검색</a><a href="timeline.html">타임라인</a><a href="eras.html">시대</a><a href="dashboard.html">통계</a><a href="films.html">작품</a><a href="watch-guide.html">시청가이드</a><a href="artifacts.html" class="active">유물</a><a href="galaxy-map.html">은하지도</a><a href="galaxy-network.html">인물관계망</a><a href="relationship-path.html">관계경로</a></div></nav>
<div class="wrap" id="app"></div>
<script>
const TYPEC={lightsaber:"#5aa9ff",holocron:"#c97aff",wayfinder:"#45d4e3",armor:"#ff9a3a",relic:"#d4af37"};
const ACCENT={darksaber:"#d8d8e6","skywalker-lightsaber":"#5aa9ff","vader-lightsaber":"#ff4d4d","sith-holocron":"#ff5a4d","sith-wayfinder":"#c97aff"};
function glyph(a,cls){const ac=ACCENT[a.id]||TYPEC[a.type]||"#8b97a8",c=cls||"vis";
  if(a.type==="lightsaber"){const dark=a.id==="darksaber";
    return `<svg class="${c}" viewBox="0 0 100 100"><rect x="45" y="14" width="10" height="44" rx="5" fill="${ac}" opacity=".18"/><rect x="${dark?47:47.5}" y="14" width="${dark?6:5}" height="44" rx="3" fill="${dark?'#1a1a22':ac}" ${dark?'stroke=\"#fff\" stroke-width=\"1\"':''} opacity=".95"/><rect x="49" y="14" width="2" height="44" fill="#fff" opacity=".82"/><rect x="44" y="58" width="12" height="6" rx="1" fill="#c2c6cd"/><rect x="45.5" y="63" width="9" height="25" rx="2" fill="#8a8f99"/><rect x="45.5" y="69" width="9" height="2" fill="#5a5f68"/><rect x="45.5" y="75" width="9" height="2" fill="#5a5f68"/></svg>`;}
  if(a.type==="holocron")return `<svg class="${c}" viewBox="0 0 100 100"><path d="M50 20 L78 50 L50 80 L22 50 Z" fill="${ac}" opacity=".12"/><path d="M50 20 L78 50 L50 80 L22 50 Z" fill="none" stroke="${ac}" stroke-width="3"/><path d="M50 20 L50 80 M22 50 L78 50" stroke="${ac}" stroke-width="1.4" opacity=".5"/><circle cx="50" cy="50" r="7" fill="${ac}" opacity=".55"/></svg>`;
  return `<svg class="${c}" viewBox="0 0 100 100"><path d="M50 12 L66 50 L50 88 L34 50 Z" fill="${ac}" opacity=".12"/><path d="M50 12 L66 50 L50 88 L34 50 Z" fill="none" stroke="${ac}" stroke-width="3"/><path d="M34 50 L66 50 M50 12 L50 88" stroke="${ac}" stroke-width="1.2" opacity=".5"/></svg>`;}
const ERAKO={dawn_of_the_jedi:"제다이의 여명",high_republic:"하이 리퍼블릭",fall_of_the_jedi:"제다이의 몰락",reign_of_the_empire:"제국의 시대",age_of_rebellion:"반란의 시대",new_republic:"뉴 리퍼블릭",rise_of_the_first_order:"퍼스트 오더의 부상",new_jedi_order:"뉴 제다이 오더"};
const STYP={film:"영화",series:"시리즈",novel:"소설",comic:"코믹",game:"게임"};
const CANON_KO={explicit:"원작 확정",referenced:"작중 언급",inferred:"정황 추론"},CANON_C={explicit:"#5fd38a",referenced:"#ffb454",inferred:"#8b97a8"};
const esc=s=>(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function getId(){return new URLSearchParams(location.search).get("id")||"darksaber";}
Promise.all([fetch("artifacts.json").then(r=>r.json()),fetch("characters.json").then(r=>r.json()),fetch("events.json").then(r=>r.json())]).then(([arts,cs,ev])=>{
  const CH=Object.fromEntries(cs.map(c=>[c.id,c])), EV=Object.fromEntries(ev.map(e=>[e.id,e]));
  const a=arts.find(x=>x.id===getId());
  const app=document.getElementById("app");
  if(!a){app.innerHTML=`<a class="back" href="artifacts.html">← 유물 목록</a><p style="color:var(--dim)">해당 유물 기록을 찾을 수 없습니다.</p>`;return;}
  document.title=`${a.name} · 유물 기록`;
  const tc=TYPEC[a.type]||"#8b97a8";
  const img=(a.external_refs||{}).databank?.image_url;
  const vis=img?`<figure><img src="${img}" alt="${esc(a.name)}" referrerpolicy="no-referrer" onerror="this.closest('figure').style.display='none';var g=document.getElementById('gfb');if(g)g.style.display=''"><figcaption>이미지 출처: Star Wars Databank © Lucasfilm Ltd.</figcaption></figure><div id="gfb" style="display:none">${glyph(a)}</div>`:glyph(a);
  let h=`<a class="back" href="artifacts.html">← 유물 목록</a><div style="--tc:${tc}">
    <span class="tbadge">${esc(a.type_ko||a.type)}</span>
    <div class="ahero">${vis}<div><h1 style="margin:0">${esc(a.name)}</h1><div class="en">${esc(a.name_en||"")}</div></div></div>
    ${a.description?`<div class="desc">${esc(a.description)}</div>`:""}
    <div class="sec">소유 계보 · 거쳐간 손 (${(a.provenance||[]).length})</div><div class="prov">`;
  (a.provenance||[]).forEach((p,i)=>{
    const last=i===a.provenance.length-1;
    const holderHtml = p.holder&&CH[p.holder] ? `<a href="character-detail.html?id=${p.holder}">${esc(CH[p.holder].name)}</a>` : esc(p.holder_label||"불명");
    const yr = p.year_label || (p.era?ERAKO[p.era]||"":"");
    h+=`<div class="prow"><div class="pyear">${esc(yr)}</div><div class="pdot ${last?"last":""}"></div><div>
      <div class="pholder">${holderHtml}</div>
      ${p.era&&ERAKO[p.era]?`<span style="font-size:10px;color:var(--dim)">${ERAKO[p.era]}</span>`:""}
      <div class="pnote">${esc(p.note||"")}</div>
      ${p.event&&EV[p.event]?`<a class="pev" href="event-detail.html?id=${p.event}">▸ ${esc(EV[p.event].title)}</a>`:""}
    </div></div>`;
  });
  h+=`</div>`;
  if(a.fate) h+=`<div class="fate" style="--tc:${tc}"><b>운명 ·</b> ${esc(a.fate)}</div>`;
  const cc=CANON_C[a.canon_status]||"#8b97a8";
  h+=`<div class="srcline">근거 · <b>${esc(a.source||"")}</b> · ${STYP[a.source_type]||a.source_type||""} · <span style="border:1px solid ${cc};color:${cc};border-radius:20px;padding:1px 8px;font-size:10px">${CANON_KO[a.canon_status]||a.canon_status||""}</span></div></div>`;
  app.innerHTML=h;window.scrollTo(0,0);
}).catch(()=>{document.getElementById("app").innerHTML=`<a class="back" href="artifacts.html">← 유물 목록</a><p style="color:var(--dim)">데이터를 불러오지 못했습니다. 로컬에선 <code>python3 -m http.server</code>로 열어주세요.</p>`;});
</script></body></html>
