<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>관계 경로 탐색기 — 스타워즈 캐넌 아카이브</title>
<style>
:root{--bg:#04060b;--ink:#e8edf4;--dim:#8b97a8;--holo:#45d4e3;--line:rgba(120,140,180,.16);--panel:rgba(10,15,24,.7)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;min-height:100vh}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,rgba(69,212,227,.025) 0 1px,transparent 1px 3px);opacity:.5}
.site-nav{position:fixed;top:0;left:0;right:0;height:46px;z-index:3000;display:flex;align-items:center;gap:16px;padding:0 18px;background:rgba(6,9,15,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);font-family:ui-monospace,monospace;box-sizing:border-box}
.site-nav .brand{color:var(--holo);font-weight:700;font-size:12px;letter-spacing:.12em;text-decoration:none;white-space:nowrap}
.site-nav .links{display:flex;gap:4px;flex-wrap:wrap;overflow:hidden}
.site-nav .links a{color:var(--dim);font-size:12px;text-decoration:none;padding:6px 11px;border-radius:6px;white-space:nowrap}
.site-nav .links a:hover{color:#dce4ee;background:rgba(255,255,255,.06)}
.site-nav .links a.active{color:var(--holo);background:rgba(69,212,227,.10)}
.site-nav .nav-search{color:var(--holo);border:1px solid rgba(69,212,227,.55);border-radius:20px;padding:3px 13px;background:rgba(69,212,227,.10);font-weight:600}
@media(max-width:560px){.site-nav{gap:8px;padding:0 10px}.site-nav .brand{font-size:10px}.site-nav .links a{font-size:10px;padding:5px 7px}}
.wrap{max-width:760px;margin:0 auto;padding:74px 18px 60px;position:relative;z-index:2}
.kicker{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.2em;color:var(--holo);text-transform:uppercase}
h1{font-size:1.7rem;margin:6px 0 4px}
.lead{color:var(--dim);font-size:13px;line-height:1.6;margin-bottom:22px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
.picker{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:end}
.fld label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;letter-spacing:.05em}
.fld input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 11px;font-size:14px}
.fld input:focus{outline:none;border-color:var(--holo)}
.swap{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--holo);border-radius:9px;width:38px;height:38px;cursor:pointer;font-size:15px;margin-bottom:1px}
.swap:hover{background:rgba(69,212,227,.12)}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
.btn{flex:1;min-width:120px;background:var(--holo);color:#04060b;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
.btn.ghost{background:rgba(255,255,255,.06);color:#cfd8e3;border:1px solid var(--line);font-weight:600}
.btn:hover{filter:brightness(1.08)}
.examples{margin-top:14px;font-size:12px;color:var(--dim)}
.examples a{color:var(--holo);text-decoration:none;cursor:pointer;border-bottom:1px dotted rgba(69,212,227,.4);margin:0 3px}
#result{margin-top:24px}
.summary{text-align:center;margin-bottom:20px}
.summary .deg{font-size:2.4rem;font-weight:800;color:var(--holo);line-height:1}
.summary .sub{color:var(--dim);font-size:13px;margin-top:6px}
.chain{display:flex;flex-direction:column;align-items:center;gap:0}
.pnode{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 16px;width:100%;max-width:420px;text-decoration:none;color:var(--ink)}
.pnode:hover{border-color:var(--holo)}
.pavatar{width:46px;height:46px;border-radius:50%;flex:none;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;border:2px solid}
.pname{font-size:15px;font-weight:700}.pname .en{display:block;font-size:11px;color:var(--dim);font-weight:400}
.connector{display:flex;flex-direction:column;align-items:center;padding:3px 0}
.connector .line{width:2px;height:13px;background:var(--ec)}
.connector .etype{font-size:11px;font-weight:700;color:var(--ec);border:1px solid var(--ec);border-radius:20px;padding:2px 11px;background:rgba(0,0,0,.2)}
.msg{text-align:center;color:var(--dim);font-size:14px;line-height:1.7;padding:30px 10px}
.msg b{color:var(--ink)}
.copied{text-align:center;color:var(--holo);font-size:12px;margin-top:8px;height:14px}
</style></head><body>
<nav class="site-nav"><a class="brand" href="index.html">✦ 캐넌 아카이브</a><div class="links"><a href="search.html" class="nav-search">⌕ 검색</a><a href="timeline.html">타임라인</a><a href="eras.html">시대</a><a href="dashboard.html">통계</a><a href="films.html">작품</a><a href="galaxy-map.html">은하지도</a><a href="galaxy-network.html">인물관계망</a><a href="relationships.html">핵심관계도</a><a href="silhouettes.html">실루엣</a></div></nav>
<div class="wrap">
  <div class="kicker">Relationship Path Finder</div>
  <h1>관계 경로 탐색기</h1>
  <p class="lead">두 인물은 몇 다리 건너 이어질까요? 275개의 혈연·사제·동맹·적대 관계망에서 <b>최단 경로</b>를 찾습니다. 결과 링크는 그대로 공유할 수 있어요.</p>
  <div class="panel">
    <div class="picker">
      <div class="fld"><label>출발 인물 · FROM</label><input id="from" list="chars" placeholder="예: 진 어소" autocomplete="off"></div>
      <button class="swap" id="swap" title="교체">⇄</button>
      <div class="fld"><label>도착 인물 · TO</label><input id="to" list="chars" placeholder="예: 그로구" autocomplete="off"></div>
    </div>
    <datalist id="chars"></datalist>
    <div class="actions">
      <button class="btn" id="go">경로 찾기</button>
      <button class="btn ghost" id="copy">🔗 링크 복사</button>
    </div>
    <div class="copied" id="copied"></div>
    <div class="examples">예시:
      <a data-f="jyn-erso" data-t="grogu">진 어소 ↔ 그로구</a> ·
      <a data-f="ahsoka-tano" data-t="rey">아소카 ↔ 레이</a> ·
      <a data-f="darth-maul" data-t="cassian-andor">다스 몰 ↔ 카시안</a> ·
      <a data-f="mae-aniseya" data-t="luke-skywalker">메이 ↔ 루크</a>
    </div>
  </div>
  <div id="result"></div>
</div>
<script>
const ETYPE={ally:{ko:"동맹",c:"#5fd38a"},rival:{ko:"적대",c:"#ff5a4d"},family:{ko:"가족",c:"#ff8fb0"},master:{ko:"사제",c:"#c79bff"}};
const ALIGNC={light:"#45d4e3",dark:"#ff5a4d",neutral:"#c9b458"};
let CH={},G={},NAME2ID={};
function build(chars,rels){
  CH=Object.fromEntries(chars.map(c=>[c.id,c]));
  chars.forEach(c=>{NAME2ID[c.name]=c.id;NAME2ID[(c.name_en||"").toLowerCase()]=c.id;});
  G={};
  const add=(a,b,t)=>{(G[a]=G[a]||[]).push([b,t]);};
  rels.forEach(r=>{add(r.s,r.t,r.type);add(r.t,r.s,r.type);});
  const dl=document.getElementById("chars");
  dl.innerHTML=chars.slice().sort((a,b)=>a.name.localeCompare(b.name,"ko")).map(c=>`<option value="${c.name}">${c.name_en||""}</option>`).join("");
}
function resolve(v){v=(v||"").trim();if(!v)return null;if(CH[v])return v;if(NAME2ID[v])return NAME2ID[v];if(NAME2ID[v.toLowerCase()])return NAME2ID[v.toLowerCase()];
  const hit=Object.values(CH).find(c=>c.name===v||c.name.includes(v));return hit?hit.id:null;}
function bfs(a,b){
  if(!G[a]||!G[b])return null;
  const q=[[a]],seen=new Set([a]);
  while(q.length){const p=q.shift();if(p[p.length-1]===b)return p;
    for(const [n] of G[p[p.length-1]]){if(!seen.has(n)){seen.add(n);q.push(p.concat(n));}}}
  return null;
}
function edgeType(a,b){const e=(G[a]||[]).find(x=>x[0]===b);return e?e[1]:"ally";}
function avatar(c){
  const col=ALIGNC[c.alignment]||"#8b97a8";
  const img=(c.external_refs||{}).databank?.image_url;
  if(img)return `<div class="pavatar" style="border-color:${col};background-image:url('${img}')"></div>`;
  return `<div class="pavatar" style="border-color:${col};color:${col};background:${col}1a">${c.name[0]}</div>`;
}
function render(path){
  const R=document.getElementById("result");
  if(path===null){R.innerHTML=`<div class="msg"><b>경로를 찾을 수 없습니다.</b><br>두 인물이 아직 같은 관계망에 이어져 있지 않아요. (서로 다른 시대·계열의 고립된 무리일 수 있어요)</div>`;return;}
  if(path.length===1){R.innerHTML=`<div class="msg">같은 인물이에요. 😅</div>`;return;}
  const deg=path.length-1;
  let h=`<div class="summary"><div class="deg">${deg}다리</div><div class="sub">${CH[path[0]].name} 와(과) ${CH[path[path.length-1]].name} 사이 · ${path.length}명의 사슬</div></div><div class="chain">`;
  path.forEach((id,i)=>{
    const c=CH[id];
    h+=`<a class="pnode" href="character-detail.html?id=${id}">${avatar(c)}<div class="pname">${c.name}<span class="en">${c.name_en||""}</span></div></a>`;
    if(i<path.length-1){const t=edgeType(id,path[i+1]),e=ETYPE[t]||{ko:t,c:"#8b97a8"};
      h+=`<div class="connector"><div class="line" style="--ec:${e.c}"></div><div class="etype" style="--ec:${e.c}">${e.ko}</div><div class="line" style="--ec:${e.c}"></div></div>`;}
  });
  h+=`</div>`;R.innerHTML=h;
}
function run(updateUrl){
  const fa=resolve(document.getElementById("from").value), tb=resolve(document.getElementById("to").value);
  if(!fa||!tb){document.getElementById("result").innerHTML=`<div class="msg">두 인물을 모두 선택해 주세요.</div>`;return;}
  render(bfs(fa,tb));
  if(updateUrl){const u=new URL(location);u.searchParams.set("from",fa);u.searchParams.set("to",tb);history.replaceState(null,"",u);}
}
document.getElementById("go").onclick=()=>run(true);
document.getElementById("swap").onclick=()=>{const f=document.getElementById("from"),t=document.getElementById("to");[f.value,t.value]=[t.value,f.value];run(true);};
document.getElementById("copy").onclick=()=>{run(true);navigator.clipboard?.writeText(location.href).then(()=>{const c=document.getElementById("copied");c.textContent="링크가 복사됐어요 ✓";setTimeout(()=>c.textContent="",2200);});};
document.querySelectorAll(".examples a").forEach(a=>a.onclick=()=>{
  document.getElementById("from").value=CH[a.dataset.f]?CH[a.dataset.f].name:a.dataset.f;
  document.getElementById("to").value=CH[a.dataset.t]?CH[a.dataset.t].name:a.dataset.t;run(true);});
[document.getElementById("from"),document.getElementById("to")].forEach(el=>el.addEventListener("keydown",e=>{if(e.key==="Enter")run(true);}));

Promise.all([fetch("characters.json").then(r=>r.json()),fetch("relations.json").then(r=>r.json())]).then(([cs,rl])=>{
  build(cs,rl);
  const p=new URLSearchParams(location.search),f=p.get("from"),t=p.get("to");
  if(f&&CH[f])document.getElementById("from").value=CH[f].name;
  if(t&&CH[t])document.getElementById("to").value=CH[t].name;
  if(f&&t)run(false);
}).catch(()=>{document.getElementById("result").innerHTML=`<div class="msg">데이터를 불러오지 못했습니다. 로컬에선 <code>python3 -m http.server</code>로 열어주세요.</div>`;});
</script></body></html>
