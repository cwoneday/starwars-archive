<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>은하 연대기 — 스타워즈 캐넌 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Spline+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* DESIGN TOKENS — 공유 design-tokens.css에서 import (제2조). 검증용 인라인. */
:root{
  --bg-void:#04060b; --bg-base:#080b12; --bg-panel:#0e131c; --bg-elevated:#141b27;
  --text:#dce4ee; --text-dim:#8b97a8; --text-faint:#515c6b;
  --holo:#45d4e3; --holo-soft:#2a8f99; --holo-glow:rgba(69,212,227,.40);
  --saber-warn:#ff5a4d; --saber-amber:#f4b740;
  --line:#1b2532; --line-bright:#2c3a4d; --line-glow:rgba(69,212,227,.30);
  --font-display:'Chakra Petch',sans-serif; --font-body:'Spline Sans',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --fs-xs:.75rem; --fs-sm:.875rem; --fs-base:1rem; --fs-lg:1.25rem; --fs-xl:1.75rem; --fs-2xl:2.5rem; --fs-3xl:3.5rem;
  --lh-tight:1.15; --lh-base:1.6; --tracking-hud:.12em;
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-6:24px; --space-8:32px; --space-12:48px; --space-16:64px;
  --radius-sm:2px; --radius:4px; --radius-lg:8px;
  --shadow-panel:0 4px 24px rgba(0,0,0,.5); --glow-holo:0 0 16px var(--holo-glow); --glow-line:0 0 8px var(--line-glow);
  --dur-fast:140ms; --dur-base:280ms; --dur-slow:520ms; --ease-out:cubic-bezier(.16,1,.3,1); --stagger:70ms;
  --tier-1-opacity:1; --tier-2-opacity:.82; --tier-3-opacity:.6;
  --certainty-exact:solid; --certainty-approximate:dashed; --certainty-disputed:dotted;
  --cat-battle:var(--saber-warn); --cat-duel:#c77dff; --cat-politics:var(--holo); --cat-mission:var(--saber-amber);
  --cat-founding:#7ee787; --cat-fall:var(--saber-warn); --cat-treaty:#79c0ff; --cat-other:var(--text-dim);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-body); color:var(--text); line-height:var(--lh-base);
  background:radial-gradient(1200px 800px at 50% -5%, #0a1018 0%, transparent 60%), radial-gradient(900px 700px at 95% 110%, #0a141c 0%, transparent 55%), var(--bg-void);
  min-height:100vh; position:relative; overflow-x:hidden; -webkit-font-smoothing:antialiased;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:radial-gradient(1px 1px at 18% 25%,rgba(220,228,238,.5),transparent),radial-gradient(1px 1px at 72% 55%,rgba(220,228,238,.35),transparent),radial-gradient(1px 1px at 42% 78%,rgba(69,212,227,.4),transparent),radial-gradient(1px 1px at 88% 18%,rgba(220,228,238,.3),transparent),radial-gradient(1px 1px at 8% 65%,rgba(220,228,238,.3),transparent);
  animation:twinkle 4.5s ease-in-out infinite alternate}
/* 전역 스캔라인 */
body::after{content:"";position:fixed;left:0;right:0;height:2px;top:0;pointer-events:none;z-index:50;
  background:linear-gradient(90deg,transparent,var(--holo-glow),transparent);opacity:0;animation:globalScan 9s linear infinite}

.wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:var(--space-8) var(--space-6) var(--space-16)}

/* HUD 상단 */
.hud-bar{font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:var(--tracking-hud);text-transform:uppercase;color:var(--holo-soft);display:flex;gap:var(--space-3);align-items:center;margin-bottom:var(--space-6);flex-wrap:wrap}
.hud-bar .sep{color:var(--text-faint)}
.title-block{margin-bottom:var(--space-8)}
.kicker{font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:var(--tracking-hud);text-transform:uppercase;color:var(--holo);margin-bottom:var(--space-2)}
h1{font-family:var(--font-display);font-weight:700;font-size:var(--fs-3xl);line-height:var(--lh-tight);text-shadow:0 0 28px rgba(69,212,227,.2);animation:flicker 8s linear infinite}
.subtitle{color:var(--text-dim);margin-top:var(--space-2);font-size:var(--fs-sm)}

/* 8시대 띠 (Era Rail) */
.era-rail{display:flex;gap:4px;margin-bottom:var(--space-6);border:1px solid var(--line);border-radius:var(--radius);padding:4px;background:var(--bg-panel);overflow-x:auto}
.era-seg{flex:1 0 auto;min-width:88px;text-align:left;border:none;cursor:pointer;background:transparent;color:var(--text-dim);
  padding:var(--space-3);border-radius:var(--radius-sm);font-family:inherit;transition:background var(--dur-fast),color var(--dur-fast),box-shadow var(--dur-fast);border-top:2px solid var(--line)}
.era-seg .es-name{font-family:var(--font-display);font-weight:500;font-size:var(--fs-sm);display:block;line-height:1.2}
.era-seg .es-range{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);letter-spacing:.04em}
.era-seg:hover{background:var(--bg-elevated);color:var(--text)}
.era-seg.active{background:var(--bg-elevated);color:var(--holo);border-top-color:var(--holo);box-shadow:0 -2px 12px var(--holo-glow)}

/* 컨트롤 */
.controls{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-8)}
.toggle{display:inline-flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.toggle button{font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:.06em;text-transform:uppercase;background:var(--bg-panel);color:var(--text-dim);border:none;border-right:1px solid var(--line);padding:var(--space-2) var(--space-4);cursor:pointer;transition:background var(--dur-fast),color var(--dur-fast)}
.toggle button:last-child{border-right:none}
.toggle button:hover{color:var(--text)}
.toggle button.on{background:rgba(69,212,227,.12);color:var(--holo)}
.count{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-faint);letter-spacing:.08em}
.count b{color:var(--holo)}

/* 시대 섹션 */
.era-section{margin-bottom:var(--space-12);scroll-margin-top:var(--space-6)}
.era-head{display:flex;align-items:baseline;gap:var(--space-3);margin-bottom:var(--space-6);flex-wrap:wrap}
.era-head h2{font-family:var(--font-display);font-weight:600;font-size:var(--fs-xl);color:var(--text)}
.era-head .er-range{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--holo-soft);letter-spacing:.06em}
.era-head .er-line{flex:1;height:1px;background:linear-gradient(90deg,var(--holo-soft),transparent);opacity:.5}

/* 척추 + 노드 */
.spine{position:relative;padding-left:var(--space-8)}
.spine::before{content:"";position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:linear-gradient(180deg,var(--holo),var(--holo-soft));opacity:.5;box-shadow:var(--glow-line)}
.node{position:relative;margin-bottom:var(--space-4)}
.node .dot{position:absolute;left:-26px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--bg-void);border:2px solid var(--holo-soft)}
.node[data-tier="1"] .dot{border-color:var(--holo);box-shadow:0 0 10px var(--holo-glow);animation:dotPulse 3s ease-in-out infinite}
.card{display:block;text-decoration:none;background:var(--bg-panel);border:1px solid var(--line);border-left:3px var(--certainty-exact) var(--holo-soft);
  border-radius:var(--radius);padding:var(--space-4) var(--space-6);transition:border-color var(--dur-fast),box-shadow var(--dur-fast),transform var(--dur-fast)}
.card:hover,.card:focus-visible{border-color:var(--holo);border-left-color:var(--holo);box-shadow:var(--glow-holo);transform:translateX(3px);outline:none}
/* tier → 시각 비중 */
.node[data-tier="2"] .card{opacity:var(--tier-2-opacity)}
.node[data-tier="3"] .card{opacity:var(--tier-3-opacity)}
.node[data-tier="2"] .card,.node[data-tier="3"] .card{padding:var(--space-3) var(--space-6)}
/* year_certainty → 좌측 선 스타일 */
.node[data-certainty="approximate"] .card{border-left-style:var(--certainty-approximate)}
.node[data-certainty="disputed"] .card{border-left-style:var(--certainty-disputed);border-left-color:var(--saber-amber)}

.card-top{display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-2)}
.yr{font-family:var(--font-mono);font-size:var(--fs-sm);color:var(--holo);font-weight:500}
.cat-dot{width:8px;height:8px;border-radius:50%;flex:none}
.cert-tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint)}
.tier-tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-left:auto}
.card h3{font-family:var(--font-display);font-weight:500;font-size:var(--fs-lg);color:var(--text);line-height:1.25}
.card .ol{color:var(--text-dim);font-size:var(--fs-sm);margin-top:4px}
.card .arrow{color:var(--holo);opacity:0;transition:opacity var(--dur-fast);font-family:var(--font-mono)}
.card:hover .arrow{opacity:1}

/* 등장 (스크롤 진입) */
.rv{opacity:0;transform:translateY(16px);transition:opacity var(--dur-slow) var(--ease-out),transform var(--dur-slow) var(--ease-out)}
.rv.in{opacity:1;transform:none}

footer.page-foot{margin-top:var(--space-16);padding-top:var(--space-6);border-top:1px solid var(--line);font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-faint);letter-spacing:.05em;display:flex;gap:var(--space-4);flex-wrap:wrap}
footer.page-foot b{color:var(--text-dim);font-weight:500}

@keyframes twinkle{0%{opacity:.3}100%{opacity:.65}}
@keyframes flicker{0%,16%,19%,52%,55%,100%{opacity:1;text-shadow:0 0 28px rgba(69,212,227,.2)}17%,54%{opacity:.76;text-shadow:0 0 6px rgba(69,212,227,.55)}}
@keyframes dotPulse{0%,100%{box-shadow:0 0 6px var(--line-glow)}50%{box-shadow:0 0 14px var(--holo-glow)}}
@keyframes globalScan{0%{top:-2px;opacity:0}6%{opacity:.6}94%{opacity:.6}100%{top:100%;opacity:0}}

@media (max-width:600px){
  h1{font-size:var(--fs-2xl)}
  .controls{flex-direction:column;align-items:flex-start}
}
@media (prefers-reduced-motion:reduce){
  .rv{transition:none;opacity:1;transform:none}
  body::before,body::after,h1,.node[data-tier="1"] .dot{animation:none}
}
</style>
</head>

    <p class="subtitle">8개 시대를 가로지르는 사건의 흐름. 시대 띠를 눌러 이동하고, tier로 표시 밀도를 조절하세요.</p>
  </div>

  <div class="era-rail" id="eraRail" role="tablist" aria-label="시대 이동"></div>

  <div class="controls">
    <div class="toggle" role="group" aria-label="표시 밀도">
      <button data-density="1" class="on">Tier 1</button>
      <button data-density="2">+ Tier 2</button>

    <span><b>인코딩</b> tier=비중 · certainty=선스타일</span>

  {id:"battle-of-jakku",era:"new_republic",year_value:5,year_label:"5 ABY",year_certainty:"exact",tier:1,category:"battle",title:"자쿠 전투",one_liner:"은하 내전을 종결지은 신공화국과 제국 잔당의 마지막 대회전"},
  {id:"galactic-concordance",era:"new_republic",year_value:5,year_label:"5 ABY",year_certainty:"exact",tier:2,category:"treaty",title:"갈락틱 컨코드",one_liner:"제국의 항복을 명문화한 평화 협정이 체결되다"},
  {id:"hosnian-cataclysm",era:"rise_of_the_first_order",year_value:34,year_label:"34 ABY",year_certainty:"exact",tier:1,category:"other",title:"호스니안 대학살",one_liner:"스타킬러 기지가 신공화국 수도 성계를 일격에 소멸시키다"},
  {id:"battle-of-starkiller-base",era:"rise_of_the_first_order",year_value:34,year_label:"34 ABY",year_certainty:"exact",tier:1,category:"battle",title:"스타킬러 기지 전투",one_liner:"저항군이 퍼스트 오더의 초병기 기지를 파괴하다"},
  {id:"battle-of-exegol",era:"new_jedi_order",year_value:35,year_label:"35 ABY",year_certainty:"exact",tier:1,category:"battle",title:"엑세골 전투",one_liner:"부활한 시디어스와 파이널 오더가 엑세골에서 최종 격파되다"}
];

const CAT_COLOR = {battle:"var(--cat-battle)",duel:"var(--cat-duel)",politics:"var(--cat-politics)",founding:"var(--cat-founding)",fall:"var(--cat-fall)",treaty:"var(--cat-treaty)",mission:"var(--cat-mission)",other:"var(--cat-other)"};

// 시대 띠
const railEl = document.getElementById("eraRail");
ERAS.forEach((e,i)=>{
  const b=document.createElement("button");
  b.className="era-seg"+(i===0?" active":"");
  b.dataset.key=e.key;
  b.innerHTML=`<span class="es-name">${e.label}</span><span class="es-range">${e.range}</span>`;
  b.addEventListener("click",()=>{document.getElementById("sec-"+e.key)?.scrollIntoView({behavior:"smooth",block:"start"});});
  railEl.appendChild(b);
});

// 타임라인 렌더 (시대별, year_value 정렬)
const tl=document.getElementById("timeline");
ERAS.forEach(era=>{
  const evs=EVENTS.filter(x=>x.era===era.key).sort((a,b)=>a.year_value-b.year_value);
  if(!evs.length) return;
  const sec=document.createElement("section");
  sec.className="era-section"; sec.id="sec-"+era.key; sec.dataset.key=era.key;
  sec.innerHTML=`<div class="era-head rv"><h2>${era.label}</h2><span class="er-range">${era.range}</span><span class="er-line"></span></div>`;
  const spine=document.createElement("div"); spine.className="spine";
  evs.forEach(ev=>{
    const node=document.createElement("div");
    node.className="node rv"; node.dataset.tier=ev.tier; node.dataset.certainty=ev.year_certainty;
    node.innerHTML=`
      <span class="dot"></span>
      <a class="card" href="event-detail.html?id=${ev.id}">
        <div class="card-top">
          <span class="yr">${ev.year_label}</span>
          <span class="cat-dot" style="background:${CAT_COLOR[ev.category]||"var(--text-dim)"}"></span>
          <span class="cert-tag">${ev.year_certainty}</span>
          <span class="tier-tag">T${ev.tier}</span>
        </div>
        <h3>${ev.title} <span class="arrow">↗</span></h3>
        <p class="ol">${ev.one_liner}</p>
      </a>`;
    spine.appendChild(node);
  });
  sec.appendChild(spine); tl.appendChild(sec);
});

document.getElementById("totalCount").textContent=EVENTS.length;

// tier 밀도 토글
const tlEl=document.getElementById("timeline");
function applyDensity(d){
  document.querySelectorAll(".node").forEach(n=>{
    const t=+n.dataset.tier;
    let show=true;
    if(d==="1") show=(t===1);
    else if(d==="2") show=(t<=2);
    n.style.display=show?"":"none";
  });
  // 빈 시대 섹션 숨김
  document.querySelectorAll(".era-section").forEach(s=>{
    const any=[...s.querySelectorAll(".node")].some(n=>n.style.display!=="none");
    s.style.display=any?"":"none";
  });
  updateCount();
}
function updateCount(){
  const shown=[...document.querySelectorAll(".node")].filter(n=>n.style.display!=="none").length;
  document.getElementById("shownCount").textContent=shown;
}
document.querySelectorAll(".toggle button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on");
    applyDensity(btn.dataset.density);
  });
});

// 스크롤 진입 등장
const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});
},{threshold:.15});
document.querySelectorAll(".rv").forEach(el=>io.observe(el));

// 스크롤 시 활성 시대 띠 갱신
const secObserver=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const key=e.target.dataset.key;
      document.querySelectorAll(".era-seg").forEach(s=>s.classList.toggle("active",s.dataset.key===key));
    }
  });
},{rootMargin:"-20% 0px -70% 0px"});
document.querySelectorAll(".era-section").forEach(s=>secObserver.observe(s));

// 키보드 접근: role=link 노드 Enter
document.querySelectorAll('.card[role="link"]').forEach(c=>{
  c.addEventListener("keydown",e=>{if(e.key==="Enter"){/* 상세 페이지 연결 예정 */}});
});

applyDensity("1");
</script>
</body>
</html>
