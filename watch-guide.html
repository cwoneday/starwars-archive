<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>시청 가이드 — 스타워즈 캐넌 아카이브</title>
<style>
:root{--bg:#04060b;--ink:#e8edf4;--dim:#8b97a8;--holo:#45d4e3;--line:rgba(120,140,180,.16);--panel:rgba(10,15,24,.7)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;min-height:100vh}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,rgba(69,212,227,.025) 0 1px,transparent 1px 3px);opacity:.5}
.site-nav{position:fixed;top:0;left:0;right:0;height:46px;z-index:3000;display:flex;align-items:center;gap:16px;padding:0 18px;background:rgba(6,9,15,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);font-family:ui-monospace,monospace;box-sizing:border-box}
.site-nav .brand{color:var(--holo);font-weight:700;font-size:12px;letter-spacing:.12em;text-decoration:none;white-space:nowrap}
.site-nav .links{display:flex;gap:4px;flex-wrap:wrap;overflow:hidden}
.site-nav .links a{color:var(--dim);font-size:12px;text-decoration:none;padding:6px 11px;border-radius:6px;white-space:nowrap}
.site-nav .links a:hover{color:#dce4ee;background:rgba(255,255,255,.06)}.site-nav .links a.active{color:var(--holo);background:rgba(69,212,227,.10)}
.site-nav .nav-search{color:var(--holo);border:1px solid rgba(69,212,227,.55);border-radius:20px;padding:3px 13px;background:rgba(69,212,227,.10);font-weight:600}
@media(max-width:560px){.site-nav{gap:8px;padding:0 10px}.site-nav .brand{font-size:10px}.site-nav .links a{font-size:10px;padding:5px 7px}}
.wrap{max-width:820px;margin:0 auto;padding:74px 18px 60px;position:relative;z-index:2}
.kicker{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.2em;color:var(--holo);text-transform:uppercase}
h1{font-size:1.8rem;margin:6px 0 4px}.lead{color:var(--dim);font-size:13px;line-height:1.6;margin-bottom:20px;max-width:640px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.tab{background:rgba(255,255,255,.05);border:1px solid var(--line);color:#cfd8e3;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer}
.tab.on{background:var(--holo);color:#04060b;border-color:var(--holo)}
.note-top{font-size:12px;color:var(--dim);margin:-8px 0 18px;line-height:1.6}
.row{display:grid;grid-template-columns:30px auto 1fr auto;gap:12px;align-items:center;padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:11px;margin-bottom:8px;text-decoration:none;color:var(--ink)}
.row:hover{border-color:var(--holo)}
.ord{font-family:ui-monospace,monospace;font-size:13px;color:var(--dim);font-weight:700;text-align:center}
.tb{font-size:9.5px;font-weight:700;color:var(--tc);border:1px solid var(--tc);border-radius:20px;padding:2px 8px;white-space:nowrap}
.ttl{font-size:14.5px;font-weight:700;min-width:0}.ttl .rn{display:block;font-size:11px;color:var(--dim);font-weight:400;margin-top:2px;line-height:1.45}
.yr{font-family:ui-monospace,monospace;font-size:12px;color:var(--dim);white-space:nowrap}
.course{margin-bottom:30px}
.course h2{font-size:1.25rem;margin-bottom:3px}.course .cb{font-size:12.5px;color:var(--dim);line-height:1.6;margin-bottom:13px}
.cstep{display:grid;grid-template-columns:26px 1fr;gap:11px;align-items:start;position:relative;padding-bottom:10px}
.cstep:not(:last-child)::after{content:"";position:absolute;left:12px;top:24px;bottom:-2px;width:2px;background:rgba(120,140,180,.22)}
.cnum{width:24px;height:24px;border-radius:50%;background:rgba(69,212,227,.12);border:1px solid var(--holo);color:var(--holo);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:1}
.cbody a{color:var(--ink);text-decoration:none;font-weight:700;font-size:14.5px}.cbody a:hover{color:var(--holo)}
.cbody .cm{font-size:12px;color:#cdd6e2;margin-top:2px;line-height:1.5}
.cbody .cy{font-size:10.5px;color:var(--dim);margin-left:6px;font-weight:400}
</style></head><body>
<nav class="site-nav"><a class="brand" href="index.html">✦ 캐넌 아카이브</a><div class="links"><a href="search.html" class="nav-search">⌕ 검색</a><a href="timeline.html">타임라인</a><a href="eras.html">시대</a><a href="films.html">작품</a><a href="watch-guide.html" class="active">시청가이드</a><a href="artifacts.html">유물</a><a href="galaxy-map.html">은하지도</a><a href="relationship-path.html">관계경로</a></div></nav>
<div class="wrap">
  <div class="kicker">Watch Guide</div>
  <h1>시청 가이드</h1>
  <p class="lead">어디서부터 봐야 할까요? 공개된 순서대로, 이야기 시간 순으로, 혹은 취향에 맞는 추천 코스로 — 스타워즈 캐넌으로 들어가는 여러 갈래의 길.</p>
  <div class="tabs">
    <button class="tab on" data-m="release">공개순</button>
    <button class="tab" data-m="chrono">연대기순</button>
    <button class="tab" data-m="course">추천 코스</button>
  </div>
  <div id="view"></div>
</div>
<script>
const TYPEC={film:"#5aa9ff",series:"#c97aff",novel:"#d4af37",game:"#5fd38a",comic:"#ff9a3a"};
const TYPEKO={film:"영화",series:"시리즈",novel:"소설",game:"게임",comic:"코믹"};
const ERA_ORDER=["dawn_of_the_jedi","high_republic","fall_of_the_jedi","reign_of_the_empire","age_of_rebellion","new_republic","rise_of_the_first_order","new_jedi_order"];
const ERAKO={dawn_of_the_jedi:"제다이의 여명",high_republic:"하이 리퍼블릭",fall_of_the_jedi:"제다이의 몰락",reign_of_the_empire:"제국의 시대",age_of_rebellion:"반란의 시대",new_republic:"뉴 리퍼블릭",rise_of_the_first_order:"퍼스트 오더의 부상",new_jedi_order:"뉴 제다이 오더"};
const COURSES=[
 {title:"스카이워커 사가",icon:"🌌",blurb:"아나킨에서 레이까지, 9편의 본편을 에피소드 순서대로. 가장 정통적인 여정.",
  items:[["ep-1-phantom-menace","아나킨과의 첫 만남"],["ep-2-attack-of-clones","클론 전쟁의 서막"],["ep-3-revenge-of-sith","제다이의 몰락과 베이더의 탄생"],["ep-4-a-new-hope","희망의 시작"],["ep-5-empire","사가 최고의 반전"],["ep-6-return-of-jedi","아나킨의 구원"],["ep-7-force-awakens","새로운 세대"],["ep-8-last-jedi","신화의 해체"],["ep-9-rise-of-skywalker","사가의 마침표"]]},
 {title:"처음이라면 — 오리지널부터",icon:"✨",blurb:"입문자에게 가장 안전한 길. 1977년 관객이 느낀 그 순서로 시작해 프리퀄·시퀄로 넓혀가세요.",
  items:[["ep-4-a-new-hope","모든 것의 시작"],["ep-5-empire","'내가 네 아버지다'"],["ep-6-return-of-jedi","오리지널의 완결"],["ep-1-phantom-menace","과거로 — 프리퀄 입장"],["ep-2-attack-of-clones",""],["ep-3-revenge-of-sith","베이더는 어떻게 태어났나"],["ep-7-force-awakens","다음 세대"],["ep-8-last-jedi",""],["ep-9-rise-of-skywalker","대단원"]]},
 {title:"안도르부터 — 어른의 스타워즈",icon:"🔥",blurb:"포스도 제다이도 없이, 제국에 맞서는 보통 사람들의 첩보 드라마. 진중한 입문로.",
  items:[["andor","반란이 태어나는 그늘"],["rogue-one","희망을 훔치는 결사대"],["ep-4-a-new-hope","그 희망이 도달한 곳"]]},
 {title:"만달로어의 길",icon:"🛡️",blurb:"제국 멸망 이후, 변경의 현상금 사냥꾼과 아이. 실사 시리즈로 입문하는 뉴 리퍼블릭 시대.",
  items:[["the-mandalorian","딘과 그로구의 시작"],["the-book-of-boba-fett","타투인의 새 질서"],["ahsoka","스론의 그림자"],["the-mandalorian-and-grogu","극장으로 (2026)"]]},
 {title:"클론 전쟁 시대 정주행",icon:"⚔️",blurb:"프리퀄과 오리지널 사이, 애니메이션이 채운 방대한 전쟁사. 깊이 들어가려는 분께.",
  items:[["ep-2-attack-of-clones","전쟁의 시작"],["the-clone-wars","전쟁의 정수"],["ep-3-revenge-of-sith","오더 66"],["the-bad-batch","클론들의 그 후"],["tales-of-the-jedi","아소카·두쿠의 곁이야기"]]},
];
const esc=s=>(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
let FILMS={},LIST=[];
function row(f,ord,extra){const tc=TYPEC[f.work_type]||"#8b97a8";
  return `<a class="row" href="film-detail.html?id=${f.id}" style="--tc:${tc}"><div class="ord">${ord}</div><div class="tb">${TYPEKO[f.work_type]||f.work_type}</div><div class="ttl">${esc(f.title)}${extra?`<span class="rn">${extra}</span>`:""}</div><div class="yr">${f.release_year||""}</div></a>`;}
function viewRelease(){
  const arr=LIST.slice().sort((a,b)=>(a.release_year||0)-(b.release_year||0));
  return `<div class="note-top">실제 공개된 순서입니다. 제작 당시 관객이 이야기를 알아간 그대로의 경험이에요.</div>`+arr.map((f,i)=>row(f,i+1,"")).join("");
}
function viewChrono(){
  const arr=LIST.slice().sort((a,b)=>{
    const ea=ERA_ORDER.indexOf(a.era_primary),eb=ERA_ORDER.indexOf(b.era_primary);
    if(ea!==eb)return ea-eb;
    const pa=a.episode_number||99,pb=b.episode_number||99;
    if(pa!==pb)return pa-pb;
    return (a.release_year||0)-(b.release_year||0);});
  return `<div class="note-top">이야기 속 시간(시대) 순서입니다. 같은 시대 안에서는 본편 에피소드·공개연도를 기준으로 정렬했어요.</div>`+arr.map((f,i)=>row(f,i+1,ERAKO[f.era_primary]||"")).join("");
}
function viewCourse(){
  return COURSES.map(c=>{
    let h=`<div class="course"><h2>${c.icon} ${esc(c.title)}</h2><div class="cb">${esc(c.blurb)}</div>`;
    c.items.forEach(([id,note],i)=>{const f=FILMS[id];if(!f)return;
      h+=`<div class="cstep"><div class="cnum">${i+1}</div><div class="cbody"><a href="film-detail.html?id=${id}">${esc(f.title)}</a><span class="cy">${f.release_year||""}</span>${note?`<div class="cm">${esc(note)}</div>`:""}</div></div>`;});
    return h+`</div>`;
  }).join("");
}
function show(m){document.getElementById("view").innerHTML=m==="release"?viewRelease():m==="chrono"?viewChrono():viewCourse();}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));t.classList.add("on");show(t.dataset.m);});
fetch("films.json").then(r=>r.json()).then(fs=>{LIST=fs;FILMS=Object.fromEntries(fs.map(f=>[f.id,f]));show("release");})
.catch(()=>{document.getElementById("view").innerHTML=`<p style="color:var(--dim)">데이터를 불러오지 못했습니다. 로컬에선 <code>python3 -m http.server</code>로 열어주세요.</p>`;});
</script></body></html>
