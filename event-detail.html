<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사건 기록 · EVENT RECORD</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Spline+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--void:#04060b;--base:#080c14;--panel:#0e131c;--elevated:#141b27;--ink:#dce4ee;--dim:#8b97a8;--faint:#515c6b;
--line:rgba(120,140,180,.14);--holo:#45d4e3;--warn:#ff5a4d;--amber:#f4b740;
--fd:'Chakra Petch',sans-serif;--fb:'Spline Sans',sans-serif;--fm:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:radial-gradient(1100px 600px at 50% -8%,#0a1018,transparent 60%),var(--void);color:var(--ink);font-family:var(--fb);min-height:100vh;line-height:1.6}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,rgba(69,212,227,.025) 0 1px,transparent 1px 3px);opacity:.5}
.wrap{max-width:780px;margin:0 auto;padding:28px 22px 80px;position:relative;z-index:2}
.hud-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-family:var(--fm);font-size:11px;color:var(--dim);letter-spacing:.08em;margin-bottom:20px}
.hud-bar .sep{color:var(--faint)}.hud-bar .id{color:var(--holo)}
.hud-bar a{color:var(--dim);text-decoration:none;border-bottom:1px dashed var(--line)}.hud-bar a:hover{color:var(--holo)}
.record{position:relative;background:linear-gradient(180deg,var(--panel),var(--base));border:1px solid var(--line);border-radius:12px;padding:34px 30px;transition:opacity .4s}
.corner{position:absolute;width:18px;height:18px;border:1.5px solid var(--holo);opacity:.55}
.corner.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}.corner.br{bottom:-1px;right:-1px;border-left:0;border-top:0}
.kicker{font-family:var(--fm);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--holo);margin-bottom:10px}
h1{font-family:var(--fd);font-weight:700;font-size:2.1rem;line-height:1.12;letter-spacing:.01em}
.title-en{font-family:var(--fm);font-size:12px;color:var(--faint);margin-top:5px;letter-spacing:.04em}
.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.badge{font-family:var(--fm);font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--line);color:var(--dim);background:rgba(255,255,255,.02)}
.badge.year{color:var(--ink);border-color:var(--holo)}.badge.year b{font-family:var(--fd);color:var(--holo)}
.badge.canon{color:var(--amber)}
.rule{height:1px;background:linear-gradient(90deg,var(--holo),transparent);margin:22px 0;opacity:.4}
.one-liner{font-family:var(--fd);font-size:1.15rem;font-weight:500;color:var(--ink);border-left:2px solid var(--holo);padding-left:14px;margin:4px 0 0}
.readout{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin:20px 0;padding:14px;background:var(--void);border:1px solid var(--line);border-radius:8px}
.readout>div{display:flex;justify-content:space-between;font-family:var(--fm);font-size:11px;border-bottom:1px solid var(--line);padding-bottom:5px}
.readout .k{color:var(--faint)}.readout .v{color:var(--holo)}
.sec-label{font-family:var(--fm);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin:24px 0 9px}
.belli{display:flex;align-items:stretch;gap:10px;margin:6px 0}
.belli .side{flex:1;background:var(--void);border:1px solid var(--line);border-radius:8px;padding:11px}
.belli .side .sl{font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--faint);margin-bottom:6px}
.belli .vs{display:flex;align-items:center;font-family:var(--fd);font-weight:700;color:var(--warn);font-size:13px}
.belli .fac{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink);margin-bottom:4px}.emb-mini{width:18px;height:18px;flex:none;filter:drop-shadow(0 0 3px currentColor)}
.outcome{font-family:var(--fd);font-weight:600;color:var(--holo);font-size:1rem;border-left:2px solid var(--holo);padding-left:12px;margin:4px 0}
.kfig{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.dd{counter-reset:phase;margin-top:4px}
.dd .step{position:relative;padding-left:34px;padding-bottom:16px;border-left:1px solid var(--line);margin-left:10px}
.dd .step:last-child{border-left-color:transparent;padding-bottom:0}
.dd .step::before{counter-increment:phase;content:counter(phase);position:absolute;left:-11px;top:0;width:22px;height:22px;border-radius:50%;background:var(--void);border:1px solid var(--holo);color:var(--holo);font-family:var(--fm);font-size:11px;display:flex;align-items:center;justify-content:center}
.dd .ph{font-family:var(--fd);font-weight:600;color:var(--ink);font-size:.98rem;margin-bottom:3px}
.dd .nt{font-size:.92rem;color:var(--dim);line-height:1.6}
.sec-body{font-size:1rem;color:var(--ink)}.sec-body.dim{color:var(--dim)}
.chip-group{margin-bottom:14px}.grp-label{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;flex-direction:column;gap:1px;padding:6px 10px;border-radius:7px;border:1px solid var(--line);background:rgba(255,255,255,.02);text-decoration:none;transition:all .15s}
a.chip:hover{border-color:var(--holo);transform:translateY(-1px)}
.chip .nm{font-size:12px;color:var(--ink)}.chip .ref{font-family:var(--fm);font-size:9px;color:var(--faint)}
.chip.pending{opacity:.55}.chip.pending .nm{color:var(--dim)}
.srcline{font-family:var(--fm);font-size:11px;color:var(--dim);margin-top:6px}.srcline b{color:var(--ink);font-weight:500}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tag{font-family:var(--fm);font-size:10px;color:var(--holo);background:rgba(69,212,227,.07);border:1px solid var(--line);border-radius:20px;padding:3px 10px}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}
.nav a{flex:1;text-decoration:none;border:1px solid var(--line);border-radius:9px;padding:12px 14px;background:rgba(255,255,255,.02);transition:all .15s;min-width:0}
.nav a:hover{border-color:var(--holo);background:rgba(69,212,227,.05)}
.nav .dir{font-family:var(--fm);font-size:10px;color:var(--faint);letter-spacing:.1em}
.nav .t{font-family:var(--fd);font-size:14px;color:var(--ink);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav .next{text-align:right}
.back{display:inline-block;margin-top:22px;font-family:var(--fm);font-size:12px;color:var(--holo);text-decoration:none;border-bottom:1px dashed var(--holo)}
.notfound{text-align:center;padding:80px 20px;color:var(--dim)}
.legend-hint{font-family:var(--fm);font-size:10px;color:var(--faint);margin-top:18px;line-height:1.7;border-top:1px solid var(--line);padding-top:14px}
</style></head>
<body>
<style>
.site-nav{position:fixed;top:0;left:0;right:0;height:46px;z-index:3000;display:flex;align-items:center;gap:16px;padding:0 18px;background:rgba(6,9,15,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(120,140,180,.16);font-family:'JetBrains Mono',monospace;box-sizing:border-box}
.site-nav .brand{color:#45d4e3;font-weight:700;font-size:12px;letter-spacing:.12em;text-decoration:none;white-space:nowrap}
.site-nav .links{display:flex;gap:4px;flex-wrap:wrap;overflow:hidden}
.site-nav .links a{color:#8b97a8;font-size:12px;letter-spacing:.03em;text-decoration:none;padding:6px 11px;border-radius:6px;white-space:nowrap;transition:color .15s,background .15s,border-color .15s;border:1px solid transparent}
.site-nav .links a:hover{color:#dce4ee;background:rgba(255,255,255,.06)}
.site-nav .links a.active{color:#45d4e3;background:rgba(69,212,227,.10);border-color:rgba(69,212,227,.32)}
@media(max-width:560px){.site-nav{gap:8px;padding:0 10px}.site-nav .brand{font-size:10px}.site-nav .links a{font-size:10px;padding:5px 7px}}
body{padding-top:46px}</style>
<nav class="site-nav"><a class="brand" href="index.html">✦ 캐넌 아카이브</a><div class="links"><a href="timeline.html">타임라인</a><a href="galaxy-network.html">인물관계망</a><a href="relationships.html">핵심관계도</a><a href="silhouettes.html">실루엣</a></div></nav>
<div class="era-bg" id="eraBg"></div>
<style>.era-bg{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none}.era-bg svg{width:100%;height:100%}</style>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="emb-jedi-order" viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="none" stroke="currentColor" stroke-width="2" opacity=".5"/><path d="M32 8 L37 32 L32 52 L27 32 Z" fill="currentColor"/><circle cx="32" cy="32" r="4" fill="#04060b" stroke="currentColor" stroke-width="1.5"/></symbol>
<symbol id="emb-sith" viewBox="0 0 64 64"><path d="M32 6 L52 50 L32 40 L12 50 Z" fill="currentColor"/><line x1="32" y1="22" x2="32" y2="58" stroke="currentColor" stroke-width="2.5"/></symbol>
<symbol id="emb-galactic-republic" viewBox="0 0 64 64"><circle cx="32" cy="32" r="24" fill="none" stroke="currentColor" stroke-width="2"/><g stroke="currentColor" stroke-width="2"><line x1="32" y1="4" x2="32" y2="60"/><line x1="4" y1="32" x2="60" y2="32"/><line x1="12" y1="12" x2="52" y2="52"/><line x1="52" y1="12" x2="12" y2="52"/></g><circle cx="32" cy="32" r="7" fill="#04060b" stroke="currentColor" stroke-width="2"/></symbol>
<symbol id="emb-galactic-empire" viewBox="0 0 64 64"><path d="M32 5 L55 18 L55 46 L32 59 L9 46 L9 18 Z" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M32 17 L45 24.5 L45 39.5 L32 47 L19 39.5 L19 24.5 Z" fill="currentColor"/></symbol>
<symbol id="emb-confederacy-of-independent-systems" viewBox="0 0 64 64"><path d="M32 6 A26 26 0 1 1 17 11" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M32 20 L44 42 L20 42 Z" fill="currentColor"/></symbol>
<symbol id="emb-trade-federation" viewBox="0 0 64 64"><circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="32" cy="32" r="9" fill="currentColor"/><g stroke="currentColor" stroke-width="2.5"><line x1="32" y1="2" x2="32" y2="13"/><line x1="32" y1="51" x2="32" y2="62"/><line x1="2" y1="32" x2="13" y2="32"/><line x1="51" y1="32" x2="62" y2="32"/></g></symbol>
<symbol id="emb-rebel-alliance" viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="none" stroke="currentColor" stroke-width="2" opacity=".4"/><path d="M32 52 C20 40 24 22 32 10 C40 22 44 40 32 52 Z" fill="currentColor"/></symbol>
<symbol id="emb-new-republic" viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="none" stroke="currentColor" stroke-width="2" opacity=".4"/><path d="M16 40 L32 18 L48 40" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 49 L32 35 L42 49" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".55"/></symbol>
<symbol id="emb-first-order" viewBox="0 0 64 64"><path d="M32 5 L55 18 L55 46 L32 59 L9 46 L9 18 Z" fill="currentColor"/><path d="M20 22 L44 42 M44 22 L20 42" stroke="#04060b" stroke-width="4"/></symbol>
<symbol id="emb-resistance" viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"/><g stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="32" y1="14" x2="32" y2="50"/><line x1="14" y1="32" x2="50" y2="32"/><line x1="20" y1="20" x2="44" y2="44"/><line x1="44" y1="20" x2="20" y2="44"/></g><circle cx="32" cy="32" r="5" fill="currentColor"/></symbol>
<symbol id="emb-final-order" viewBox="0 0 64 64"><g stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"><line x1="32" y1="8" x2="32" y2="52"/><path d="M16 20 L16 44 M48 20 L48 44"/><path d="M16 44 L32 54 L48 44"/></g><path d="M28 53 L32 60 L36 53 Z" fill="currentColor"/></symbol>
<symbol id="emb-nihil" viewBox="0 0 64 64"><g stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"><path d="M32 32 C40 20 52 18 56 24"/><path d="M32 32 C28 46 16 50 10 44"/><path d="M32 32 C44 40 46 52 40 56"/></g><circle cx="32" cy="32" r="4" fill="currentColor"/></symbol>
</defs></svg>
<main class="wrap" id="app"></main>
<script>
let EVENTS=[],BYID={},CHARMAP={},LOCMAP={},FACMAP={};
const ERABG={
 dawn_of_the_jedi:{g:["#1a2a3a","#0a1118"],a:[0.15,0.45,0.5]},
 high_republic:{g:["#3a3320","#15110a"],a:[0.6,0.5,0.2]},
 fall_of_the_jedi:{g:["#2a2230","#120a14"],a:[0.55,0.35,0.2]},
 reign_of_the_empire:{g:["#0d1622","#070b12"],a:[0.25,0.34,0.45]},
 age_of_rebellion:{g:["#16233a","#0a1018"],a:[0.2,0.45,0.7]},
 new_republic:{g:["#16302a","#0a1812"],a:[0.2,0.55,0.45]},
 rise_of_the_first_order:{g:["#2a0d0d","#120708"],a:[0.7,0.18,0.12]},
 new_jedi_order:{g:["#1a2740","#0a1322"],a:[0.4,0.55,0.7]}
};
const STARS=(()=>{let r=7,out="";const rnd=()=>{r=(r*9301+49297)%233280;return r/233280};for(let i=0;i<26;i++){out+=`<circle cx="${(rnd()*1200)|0}" cy="${(rnd()*800)|0}" r="${(rnd()*1.4+0.5).toFixed(1)}" fill="#eaf2ff" opacity="${(rnd()*0.5+0.3).toFixed(2)}"/>`}return out})();
function eraBackdrop(era){const c=ERABG[era]||ERABG.dawn_of_the_jedi;const[ar,ag,ab]=c.a;
 return `<svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice"><defs><radialGradient id="eg" cx="35%" cy="28%" r="90%"><stop offset="0%" stop-color="${c.g[0]}"/><stop offset="55%" stop-color="${c.g[1]}"/><stop offset="100%" stop-color="#04060b"/></radialGradient><filter id="ef"><feTurbulence type="fractalNoise" baseFrequency="0.006 0.009" numOctaves="3" seed="9"/><feColorMatrix type="matrix" values="0 0 0 0 ${ar}  0 0 0 0 ${ag}  0 0 0 0 ${ab}  0 0 0 0.5 0"/></filter></defs><rect width="1200" height="800" fill="url(#eg)"/><rect width="1200" height="800" filter="url(#ef)" opacity="0.32"/>${STARS}</svg>`;
}

const ERA={dawn_of_the_jedi:"제다이의 여명",high_republic:"하이 리퍼블릭",fall_of_the_jedi:"제다이의 몰락",reign_of_the_empire:"제국의 시대",age_of_rebellion:"반란의 시대",new_republic:"뉴 리퍼블릭",rise_of_the_first_order:"퍼스트 오더의 부상",new_jedi_order:"뉴 제다이 오더"};
const CAT={battle:"전투",duel:"결투",politics:"정치",mission:"임무",founding:"창건",fall:"몰락",discovery:"발견",treaty:"조약",other:"기타"};
const STYP={film:"영화",series:"시리즈",novel:"소설",comic:"코믹",game:"게임"};
const CERT_BORDER={exact:"solid",approximate:"dashed",disputed:"dotted"};
const CERT_KO={exact:"확정",approximate:"근사",disputed:"논쟁"};
const CANON_OP={explicit:1,referenced:.9,inferred:.78};
const CANON_KO={explicit:"명시",referenced:"언급",inferred:"추론"};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const EMBC={light:"#5aa9ff",dark:"#ff5a4d",neutral:"#c2a86a"};
function facEmb(f){const a=(FACMAP[f]&&FACMAP[f].a)||"neutral";const n=FACMAP[f]?esc(FACMAP[f].n):f;return `<span class="fac"><svg class="emb-mini" style="color:${EMBC[a]}"><use href="#emb-${f}"/></svg>${n}</span>`;}
function getId(){const u=new URLSearchParams(location.search);return u.get("id")||location.hash.replace("#","")||"battle-of-yavin";}

function entityChips(ids,label,kind){
  if(!ids||!ids.length)return"";
  const chips=ids.map(id=>{
    if(kind==="char"&&CHARMAP[id])return `<a class="chip" href="character-detail.html?id=${id}" title="${esc(CHARMAP[id])} 기록 보기"><span class="nm">${esc(CHARMAP[id])}</span><span class="ref">${esc(id)}</span></a>`;
    if(kind==="loc"&&LOCMAP[id])return `<a class="chip" href="location-detail.html?id=${id}" title="${esc(LOCMAP[id].o)}"><span class="nm">${esc(LOCMAP[id].n)}</span><span class="ref">${esc(id)}</span></a>`;
    if(kind==="fac"&&FACMAP[id])return `<a class="chip" href="faction-detail.html?id=${id}" title="${esc(FACMAP[id].o)}"><span class="nm">${esc(FACMAP[id].n)}</span><span class="ref">${esc(id)}</span></a>`;
    return `<span class="chip pending" title="해당 축 준비 중"><span class="nm">${esc(id.replace(/-/g," "))}</span><span class="ref">${esc(id)}</span></span>`;
  }).join("");
  return `<div class="chip-group"><div class="grp-label">${label}</div><div class="chips">${chips}</div></div>`;
}
function navLink(id,dir){
  if(!id||!BYID[id])return `<span style="flex:1"></span>`;
  const e=BYID[id];const cls=dir==="next"?"next":"";
  return `<a class="${cls}" href="?id=${id}"><div class="dir">${dir==="next"?"다음 사건 →":"← 이전 사건"}</div><div class="t">${esc(e.title)}</div></a>`;
}
function render(){
  const e=BYID[getId()];const app=document.getElementById("app");
  if(!e){app.innerHTML=`<div class="notfound">해당 사건 기록을 찾을 수 없습니다.<br><a class="back" href="timeline.html">← 타임라인으로</a></div>`;return;}
  document.title=`${e.title} · 사건 기록`;
  document.getElementById("eraBg").innerHTML=eraBackdrop(e.era);
  app.innerHTML=`
  <div class="hud-bar">
    <a href="timeline.html">스타워즈 캐넌 아카이브</a><span class="sep">//</span>
    <span>${e.era.toUpperCase()}</span><span class="sep">//</span><span class="id">${e.id}</span>
  </div>
  <article class="record" style="opacity:${CANON_OP[e.canon_status]||1}">
    <span class="corner tl"></span><span class="corner br"></span>
    <div class="kicker">사건 기록 · Event Record</div>
    <h1>${esc(e.title)}</h1><div class="title-en">${esc(e.title_en)}</div>
    <div class="meta">
      <span class="badge year" style="border-style:${CERT_BORDER[e.year_certainty]}" title="연대 확정도: ${CERT_KO[e.year_certainty]}"><b>${esc(e.year_label)}</b></span>
      <span class="badge">${ERA[e.era]}</span><span class="badge">${CAT[e.category]||e.category}</span>
      <span class="badge">tier ${e.tier}</span><span class="badge canon" title="원작 확정도">canon · ${CANON_KO[e.canon_status]}</span>
    </div>
    <div class="rule"></div>
    <p class="one-liner">${esc(e.one_liner)}</p>
    <div class="readout">
      <div><span class="k">era</span><span class="v">${e.era}</span></div>
      <div><span class="k">year_value</span><span class="v">${e.year_value}</span></div>
      <div><span class="k">year_certainty</span><span class="v">${e.year_certainty}</span></div>
      <div><span class="k">tier</span><span class="v">${e.tier}</span></div>
      <div><span class="k">category</span><span class="v">${e.category}</span></div>
      <div><span class="k">canon_status</span><span class="v">${e.canon_status}</span></div>
    </div>
    ${e.belligerents?`<div class="sec-label">교전 · Belligerents</div><div class="belli"><div class="side"><div class="sl">SIDE A</div>${(e.belligerents.side_a||[]).map(facEmb).join("")||'<span class="fac" style="color:var(--faint)">—</span>'}</div><div class="vs">VS</div><div class="side"><div class="sl">SIDE B</div>${(e.belligerents.side_b||[]).map(facEmb).join("")||'<span class="fac" style="color:var(--faint)">—</span>'}</div></div>`:""}
    ${e.outcome?`<div class="sec-label">결과 · Outcome</div><p class="outcome">${esc(e.outcome)}</p>`:""}
    ${e.key_figures&&e.key_figures.length?`<div class="sec-label">핵심 인물 · Key Figures</div><div class="kfig">${e.key_figures.map(id=>CHARMAP[id]?`<a class="chip" href="character-detail.html?id=${id}"><span class="nm">${esc(CHARMAP[id])}</span></a>`:"").join("")}</div>`:""}
    ${e.background?`<div class="sec-label">배경 · Background</div><p class="sec-body">${esc(e.background)}</p>`:""}
    <div class="sec-label">개요 · Summary</div><p class="sec-body">${esc(e.summary)}</p>
    ${e.significance?`<div class="sec-label">의미 · Significance</div><p class="sec-body dim">${esc(e.significance)}</p>`:""}
    ${e.aftermath?`<div class="sec-label">여파 · Aftermath</div><p class="sec-body">${esc(e.aftermath)}</p>`:""}
    ${e.deep_dive&&e.deep_dive.length?`<div class="sec-label">전개 · Deep Dive</div><div class="dd">${e.deep_dive.map(d=>`<div class="step"><div class="ph">${esc(d.phase)}</div><div class="nt">${esc(d.note)}</div></div>`).join("")}</div>`:""}
    <div class="rule"></div>
    <div class="sec-label">연결 · Linked Entities</div>
    ${entityChips(e.characters,"인물 · characters","char")}
    ${entityChips(e.locations,"장소 · locations","loc")}
    ${entityChips(e.factions,"세력 · factions","fac")}
    <div class="srcline">출처 · <b>${esc(e.source)}</b> · ${STYP[e.source_type]||e.source_type}</div>
    ${e.tags&&e.tags.length?`<div class="tags">${e.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}</div>`:""}
    <div class="legend-hint">연대 배지 테두리 = 확정도(실선 확정 · 파선 근사 · 점선 논쟁) · 기록 투명도 = 원작 확정도(명시·언급·추론). 데이터 그대로의 시각 인코딩입니다 (헌법 제5조).</div>
  </article>
  <div class="nav">${navLink(e.preceded_by&&e.preceded_by[0],"prev")}${navLink(e.followed_by&&e.followed_by[0],"next")}</div>
  <a class="back" href="timeline.html">← 전체 타임라인으로</a>`;
  window.scrollTo(0,0);
}
async function loadData(){
  try{
    const [ev,ch,lo,fa]=await Promise.all([
      fetch("events.json").then(r=>r.json()),
      fetch("characters.json").then(r=>r.json()),
      fetch("locations.json").then(r=>r.json()),
      fetch("factions.json").then(r=>r.json())
    ]);
    EVENTS=ev;BYID=Object.fromEntries(ev.map(e=>[e.id,e]));
    CHARMAP=Object.fromEntries(ch.map(c=>[c.id,c.name]));
    LOCMAP=Object.fromEntries(lo.map(l=>[l.id,{n:l.name,o:l.one_liner}]));
    FACMAP=Object.fromEntries(fa.map(f=>[f.id,{n:f.name,o:f.one_liner,a:f.alignment}]));
    render();
  }catch(err){
    document.getElementById("app").innerHTML=`<div class="notfound"><div style="font-family:var(--fd);font-size:1.1rem;color:var(--ink);margin-bottom:14px">데이터 파일을 불러오지 못했습니다</div>이 페이지는 events·characters·locations·factions.json을 직접 읽습니다 (헌법 제2조 — 하나의 공유 스키마).<br>파일을 더블클릭하면 브라우저 보안정책(file://)이 막습니다. 로컬 서버로 열어주세요:<br><br><code style="color:var(--holo);font-family:var(--fm)">python3 -m http.server</code><br><br>그 뒤 <code style="color:var(--holo);font-family:var(--fm)">localhost:8000/event-detail.html?id=battle-of-yavin</code></div>`;
  }
}
window.addEventListener("popstate",render);
document.addEventListener("click",e=>{const a=e.target.closest('a[href^="?id="]');if(a){e.preventDefault();history.pushState({},"",a.getAttribute("href"));render();}});
loadData();
</script>
