<style>
:root{--void:#04060b;--base:#080c14;--panel:#0e131c;--elevated:#141b27;--ink:#dce4ee;--dim:#8b97a8;--faint:#515c6b;
--line:rgba(120,140,180,.14);--holo:#45d4e3;--warn:#ff5a4d;--amber:#f4b740;

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:radial-gradient(1100px 600px at 50% -8%,#0a1018,transparent 60%),var(--void);color:var(--ink);font-family:var(--fb);min-height:100vh;line-height:1.6}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,rgba(69,212,227,.025) 0 1px,transparent 1px 3px);opacity:.5}

.hud-bar a{color:var(--dim);text-decoration:none;border-bottom:1px dashed var(--line)}.hud-bar a:hover{color:var(--holo)}
.record{position:relative;background:linear-gradient(180deg,var(--panel),var(--base));border:1px solid var(--line);border-radius:12px;padding:34px 30px;transition:opacity .4s}
.corner{position:absolute;width:18px;height:18px;border:1.5px solid var(--holo);opacity:.55}
.corner.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}.corner.br{bottom:-1px;right:-1px;border-left:0;border-top:0}
.kicker{font-family:var(--fm);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--holo);margin-bottom:10px}
h1{font-family:var(--fd);font-weight:700;font-size:2.1rem;line-height:1.12;letter-spacing:.01em}

.kfig{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.dd{counter-reset:phase;margin-top:4px}
.dd .step{position:relative;padding-left:34px;padding-bottom:16px;border-left:1px solid var(--line);margin-left:10px}
.dd .step:last-child{border-left-color:transparent;padding-bottom:0}
.dd .step::before{counter-increment:phase;content:counter(phase);position:absolute;left:-11px;top:0;width:22px;height:22px;border-radius:50%;background:var(--void);border:1px solid var(--holo);color:var(--holo);font-family:var(--fm);font-size:11px;display:flex;align-items:center;justify-content:center}

.dd .nt{font-size:.92rem;color:var(--dim);line-height:1.6}
.sec-body{font-size:1rem;color:var(--ink)}.sec-body.dim{color:var(--dim)}
.chip-group{margin-bottom:14px}.grp-label{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:7px}

.chip .nm{font-size:12px;color:var(--ink)}.chip .ref{font-family:var(--fm);font-size:9px;color:var(--faint)}

.srcline{font-family:var(--fm);font-size:11px;color:var(--dim);margin-top:6px}.srcline b{color:var(--ink);font-weight:500}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tag{font-family:var(--fm);font-size:10px;color:var(--holo);background:rgba(69,212,227,.07);border:1px solid var(--line);border-radius:20px;padding:3px 10px}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}
.nav a{flex:1;text-decoration:none;border:1px solid var(--line);border-radius:9px;padding:12px 14px;background:rgba(255,255,255,.02);transition:all .15s;min-width:0}
.nav a:hover{border-color:var(--holo);background:rgba(69,212,227,.05)}
.nav .dir{font-family:var(--fm);font-size:10px;color:var(--faint);letter-spacing:.1em}
.nav .t{font-family:var(--fd);font-size:14px;color:var(--ink);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav .next{text-align:right}
.back{display:inline-block;margin-top:22px;font-family:var(--fm);font-size:12px;color:var(--holo);text-decoration:none;border-bottom:1px dashed var(--holo)}
.notfound{text-align:center;padding:80px 20px;color:var(--dim)}

ovel","canon_status":"inferred","one_liner":"다크사이드에 끌린 무리가 갈라져 나가며 첫 내전이 일어나다","summary":"교단 안에서 포스를 정복과 힘의 수단으로 보려는 무리가 갈라져 나가며 첫 대규모 내분이 벌어졌다. 이들은 훗날 다크사이드 전통의 선조 격으로 기록된다.","significance":"제다이와 시스라는, 이후 모든 갈등의 원형이 여기서 처음 모습을 드러낸다.","preceded_by":["first-jedi-temple"],"followed_by":["hundred-year-darkness"],"tags":["다크사이드","내전","분열"],"belligerents":{"side_a":["jedi-order"],"side_b":["sith"]},"outcome":"교단 분열 — 다크사이드 분파 이탈","key_figures":[],"background":"포스를 힘과 정복의 수단으로 보려는 무리가 교단의 규율에 반발하며 갈라졌다.","aftermath":"이 분파는 훗날 다크사이드 전통의 선조 격으로 기록되며, 제다이와 시스 대립의 원형이 된다.","deep_dive":[]},{"id":"hundred-year-darkness","title":"백년의 어둠","title_en":"The Hundred-Year Darkness","era":"dawn_of_the_jedi","year_value":-24300,"year_label":"~24,300 BBY","year_certainty":"disputed","category":"battle","tier":1,"characters":[],"locations":["tython"],"factions":["jedi-order","sith"],"source":"제다이 전승","source_type":"novel","canon_status":"inferred","one_liner":"금지된 포스를 좇는 무리와 제다이가 벌인 고대의 긴 전쟁","summary":"대분열로 갈라져 나간 다크사이드 추종자들이 금지된 힘으로 괴물 같은 군대를 부려 제다이에 맞섰다. 빛과 어둠이 처음으로 전면전을 벌인, 한 세대를 넘긴 길고 참혹한 전쟁이었다.","significance":"빛과 어둠의 대립이 사상 처음으로 대규모 전쟁의 형태로 터져 나온 사건. 이 전쟁의 패자들이 훗날 시스가 된다.","belligerents":{"side_a":["jedi-order"],"side_b":["sith"]},"outcome":"제다이의 승리, 다크사이드 무리 추방","key_figures":[],"background":"교단을 떠난 무리는 포스를 정복과 변형의 도구로 삼으며 점점 위험해졌다. 제다이는 더 이상 이들을 방관할 수 없었다.","aftermath":"제다이가 승리하지만 큰 대가를 치렀고, 패배한 다크사이드 무리는 은하 변경으로 추방된다 — 시스의 탄생으로 이어진다.","deep_dive":[{"phase":"금지된 실험","note":"분열한 무리가 포스로 생명을 비틀어 전쟁 짐승과 군대를 만들어낸다. 절제를 버린 힘의 추구였다."},{"phase":"전면전","note":"빛과 어둠이 처음으로 대규모 군대를 맞부딪힌다. 전쟁은 한 세대를 넘겨 이어진다."},{"phase":"제다이의 승리","note":"제다이가 큰 희생 끝에 다크사이드 군세를 꺾는다. 그러나 교단도 깊은 상처를 입는다."},{"phase":"추방","note":"패배한 무리는 처형 대신 추방된다. 이 관용이 훗날 더 큰 위협의 씨앗이 된다."}],"tags":["다크사이드","전쟁","고대"],"preceded_by":["first-schism"],"followed_by":["founding-of-the-sith"]},{"id":"founding-of-the-sith","title":"시스의 기원","title_en":"Founding of the Sith","era":"dawn_of_the_jedi","year_value":-24000,"year_label":"~24,000 BBY","year_certainty":"disputed","category":"founding","tier":1,"characters":[],"locations":["moraband"],"factions":["sith"],"source":"제다이 전승","source_type":"novel","canon_status":"inferred","one_liner":"추방된 다크사이드 무리가 변경에서 시스 전통을 세우다","summary":"백년의 어둠에서 패해 추방된 다크사이드 무리는 은하 변경의 외딴 행성에 정착했다. 그곳에서 토착 종족과 뒤섞이며 증오와 힘을 숭배하는 새로운 전통, 시스를 세운다.","significance":"이후 수만 년간 제다이의 영원한 적이 될 시스가 비로소 하나의 전통으로 자리잡는다. 빛과 어둠의 대립이 두 교단의 형태로 굳어진다.","belligerents":{"side_a":["sith"],"side_b":[]},"outcome":"시스 전통 확립","key_figures":[],"background":"전쟁에서 진 다크사이드 무리는 죽음 대신 추방을 택해 알려진 우주 밖으로 사라졌다.","aftermath":"시스는 변경에서 은밀히 세를 키우며, 먼 훗날 다시 은하로 돌아와 제다이와 충돌하게 된다.","deep_dive":[{"phase":"추방과 정착","note":"패배한 무리가 변경의 외딴 행성에 다다라 새 터전을 잡는다."},{"phase":"융합","note":"이들은 토착 종족과 뒤섞이며 다크사이드를 숭배하는 독자적 문화를 만든다."},{"phase":"전통의 확립","note":"증오·야망·힘의 추구를 교리로 삼은 시스 전통이 형태를 갖춘다."},{"phase":"잠복","note":"시스는 변경에서 수만 년간 힘을 키우며 제다이에 대한 복수를 벼른다."}],"tags":["시스","기원","다크사이드"],"preceded_by":["hundred-year-darkness"],"followed_by":["great-disaster"]},{"id":"great-disaster","title":"대재난","title_en":"The Great Hyperspace Disaster","era":"high_republic","year_value":-232,"year_label":"232 BBY","year_certainty":"exact","category":"other","tier":1,"characters":[],"locations":["starlight-beacon"],"factions":["galactic-republic","jedi-order","nihil"],"source":"하이 리퍼블릭: 빛의 시대","source_type":"novel","canon_status":"explicit","one_liner":"초공간 사고가 연쇄 재난을 일으켜 변경계를 휩쓸다","summary":"초공간을 항행하던 대형 선박의 사고가 연쇄 폭발과 잔해 세례로 이어져 변경계 여러 행성을 덮쳤다. 공화국과 제다이는 전례 없는 규모의 구조 작전에 나섰다.","significance":"하이 리퍼블릭의 낙관에 처음으로 균열을 낸 사건으로, 변경의 위협 니힐의 등장을 알린다.","preceded_by":["founding-of-the-sith"],"followed_by":["battle-of-kur"],"tags":["초공간","재난","니힐"],"belligerents":{"side_a":["galactic-republic","jedi-order"],"side_b":["nihil"]},"outcome":"대규모 인명·물적 피해, 변경 위협 부상","key_figures":[],"background":"초공간을 항행하던 대형 선박의 사고가 연쇄 폭발과 잔해 세례로 번져 변경계 여러 행성을 덮쳤다.","aftermath":"공화국과 제다이가 전례 없는 구조 작전에 나섰고, 하이 리퍼블릭의 낙관에 첫 균열이 생기며 약탈 세력 니힐의 위협이 드러난다.","deep_dive":[{"phase":"평온한 확장기","note":"하이 리퍼블릭은 공화국과 제다이가 변경으로 뻗어 나가던 낙관의 시대였다. 위협보다 가능성이 앞서던 황금기다."},{"phase":"초공간의 참사","note":"항행하던 대형 선박이 초공간에서 산산이 부서지고, 그 잔해가 빛보다 빠른 속도로 변경계 곳곳에 쏟아진다."},{"phase":"전례 없는 구조전","note":"제다이와 공화국이 잔해의 궤적을 예측해 막아내려 사력을 다한다. 영웅적 희생이 잇따르지만 피해는 막대했다."},{"phase":"니힐의 그림자","note":"사고 뒤에 변경의 약탈 집단 니힐의 흔적이 드러난다. 빛의 시대의 낙관에 첫 균열이 생기고, 새로운 위협의 윤곽이 나타난다."}],"work":"light-of-the-jedi"},{"id":"battle-of-kur","title":"쿠르 전투","title_en":"Battle of Kur","era":"high_republic","year_value":-231.5,"year_label":"232 BBY","year_certainty":"approximate","category":"battle","tier":2,"characters":[],"locations":[],"factions":["galactic-republic","jedi-order","nihil"],"source":"하이 리퍼블릭: 빛의 시대","source_type":"novel","canon_status":"referenced","one_liner":"대재난의 배후 니힐을 제다이가 처음으로 추격해 맞붙다","summary":"대재난의 잔해 속에서 약탈을 일삼던 니힐의 흔적을 쫓아, 제다이와 공화국 함대가 변경의 성운에서 이들과 처음으로 직접 충돌했다. 무질서한 전법의 니힐을 상대로 제다이는 고전 끝에 승리한다.","significance":"변경의 위협 니힐의 실체가 드러나고, 빛의 시대가 처음으로 조직적인 적과 마주한 사건.","belligerents":{"side_a":["galactic-republic","jedi-order"],"side_b":["nihil"]},"outcome":"제다이·공화국의 승리, 니힐 위협 표면화","key_figures":[],"background":"대재난 직후 변경계는 혼란에 빠졌고, 그 틈을 니힐이 약탈로 파고들었다.","aftermath":"니힐의 존재가 공화국에 각인됐지만, 그 지도부의 정체와 규모는 여전히 베일에 싸였다.","deep_dive":[],"tags":["니힐","변경","추격전"],"preceded_by":["great-disaster"],"followed_by":["starlight-beacon"],"work":"light-of-the-jedi"},{"id":"starlight-beacon","title":"스타라이트 비콘 봉헌","title_en":"Dedication of Starlight Beacon","era":"high_republic","year_value":-231,"year_label":"231 BBY","year_certainty":"exact","category":"founding","tier":2,"characters":[],"locations":["starlight-beacon"],"factions":["galactic-republic","jedi-order"],"source":"하이 리퍼블릭","source_type":"novel","canon_status":"explicit","one_liner":"변경 수호의 상징인 거대 우주 정거장이 가동을 시작하다","summary":"변경계 수호와 탐사의 거점으로 삼기 위해 공화국이 거대한 우주 정거장을 가동했다. 빛의 시대를 상징하는 기념물로 봉헌되었다.","significance":"공화국의 확장 의지와 제다이의 수호 이상이 한데 모인 상징이자, 곧 그 상징이 무너질 무대가 된다.","preceded_by":["battle-of-kur"],"followed_by":["attack-on-valo"],"tags":["정  스타를 완성하고, 그 위력을 알데란 파괴로 증명한 직후였다. 빼낸 설계도에서 반란연합은 단 하나의 약점을 찾아낸다 — 표면의 작은 배기구로 정밀 사격을 넣으면 원자로가 연쇄 폭발한다는 것. 야빈 4의 비밀 기지를 겨눈 데스 스타가 사정거리에 들기 전, 루크 스카이워커가 이끄는 소수의 전투기 편대가 참호를 따라 돌입한다. 동료들이 차례로 스러지고 베이더의 타이 전투기가 추격하는 가운데, 한 솔로의 기습과 포스에 몸을 맡긴 루크의 마지막 사격이 약점을 꿰뚫는다.","significance":"무적으로 보이던 제국이 처음으로 꺾이며, 저항이 이길 수 있다는 희망이 은하 전체로 번진다. 또한 한 농장 소년이 포스의 길에 들어섰음을 알린 사건이기도 하다.","preceded_by":["battle-of-scarif"],"followed_by":["battle-of-hoth"],"tags":["데스 스타","엑스윙","희망"],"belligerents":{"side_a":["rebel-alliance"],"side_b":["galactic-empire"]},"outcome":"반란연합의 결정적 승리 — 데스 스타 파괴","key_figures":["luke-skywalker","darth-vader","leia-organa","wilhuff-tarkin"],"background":"클론 전쟁을 끝내며 세워진 은하 제국은 공포로 은하를 다스렸다. 흩어져 있던 저항 세포들은 반란연합으로 규합되었지만, 제국의 새 병기 데스 스타 앞에서는 무력했다. 스카리프에서 목숨을 걸고 빼낸 설계도가 레이아를 거쳐 기지로 향하면서, 반란연합은 처음으로 반격의 실마리를 쥔다.","aftermath":"데스 스타와 함께 제국의 위신이 무너졌고, 반란연합은 결정적 상징적 승리를 얻었다. 그러나 베이더는 살아남았고, 제국은 곧 더 큰 반격(호스 전투)을 준비한다. 루크는 이 승리를 계기로 본격적인 제다이의 길로 향한다.","deep_dive":[{"phase":"배경 — 알데란의 비극","note":"제국은 데스 스타의 위력을 증명하려 평화의 행성 알데란을 파괴한다. 이 잔혹한 시범이 역설적으로 반란연합의 결의를 굳힌다."},{"phase":"설계도와 약점","note":"빼낸 설계도를 분석한 반란연합은 표면 배기구라는 단 하나의 취약점을 발견한다. 정밀 사격이 아니면 닿지 않는, 사실상 불가능에 가까운 표적이었다."},{"phase":"참호 돌입","note":"데스 스타가 야빈 4를 사정거리에 두기까지 시간은 촉박했다. 전투기 편대가 표면 참호로 돌입하지만 대공포와 베이더의 추격에 하나둘 격추된다."},{"phase":"포스에 맡긴 사격","note":"조준 컴퓨터를 끄고 포스의 인도에 따른 루크의 마지막 사격이 배기구를 꿰뚫는다. 위기의 순간 돌아온 한 솔로가 베이더를 밀어낸 직후였다."},{"phase":"연쇄 폭발","note":"단 한 발이 원자로의 연쇄 반응을 일으켜 데스 스타가 폭발한다. 반란연합은 절망적 열세를 뒤집고 첫 결정적 승리를 거둔다."}],"work":"ep-4-a-new-hope"},{"id":"battle-of-hoth","title":"호스 전투","title_en":"Battle of Hoth","era":"age_of_rebellion","year_value":3,"year_label":"3 ABY","year_certainty":"exact","category":"battle","tier":1,"characters":["luke-skywalker","han-solo","leia-organa","darth-vader","chewbacca","c-3po","r2-d2","boba-fett"],"locations":["hoth"],"factions":["rebel-alliance","galactic-empire"],"source":"스타워즈 에피소드 5: 제국의 역습","source_type":"film","canon_status":"explicit","one_liner":"제국이 반란군의 얼음 행성 거점 에코 기지를 급습하다","summary":"제국이 얼음 행성 호스에 숨은 반란군 에코 기지를 추적해 급습했다. 반란군은 거대한 보행 병기 앞에 기지를 버리고 가까스로 탈출했다.","significance":"야빈 이후 기세를 올리던 반란군이 제국의 반격에 쫓기며 가장 큰 위기를 맞는 국면.","preceded_by":["battle-of-yavin"],"followed_by":["battle-of-endor"],"tags":["에코 기지","AT-AT","후퇴"],"belligerents":{"side_a":["galactic-empire"],"side_b":["rebel-alliance"]},"outcome":"제국의 반격, 반란군 기지 함락","key_figures":["luke-skywalker","han-solo","leia-organa","darth-vader"],"background":"제국이 얼음 행성 호스의 에코 기지를 추적해 거대한 보행 병기로 급습했다.","aftermath":"반란군은 기지를 버리고 가까스로 탈출했다. 야빈 이후 기세를 올리던 저항이 가장 큰 위기를 맞는 국면이다.","deep_dive":[{"phase":"발각","note":"제국의 정찰 드로이드가 얼음 행성에 숨은 에코 기지를 찾아낸다. 베이더의 함대가 즉시 호스로 향한다."},{"phase":"지상 방어전","note":"반란군은 거대한 보행 병기 앞에서 시간을 벌며 수송선을 한 척씩 탈출시킨다."},{"phase":"흩어진 길","note":"기지를 버린 주역들은 뿔뿔이 흩어진다. 한 무리는 추격을 피해 달아나고, 루크는 스승을 찾아 늪의 행성으로 향한다."},{"phase":"위기의 국면","note":"야빈 이후 기세를 올리던 반란이 제국의 반격에 쫓기며 가장 큰 위기를 맞는다."}],"work":"ep-5-empire"},{"id":"battle-of-endor","title":"엔도 전투","title_en":"Battle of Endor","era":"age_of_rebellion","year_value":4,"year_label":"4 ABY","year_certainty":"exact","category":"battle","tier":1,"characters":["luke-skywalker","darth-vader","palpatine","han-solo","leia-organa","chewbacca","lando-calrissian","ackbar","wicket-systri-warrick","nien-nunb"],"locations":["endor","death-star-ii"],"factions":["rebel-alliance","galactic-empire"],"source":"스타워즈 에피소드 6: 제다이의 귀환","source_type":"film","canon_status":"explicit","one_liner":"두 번째 데스 스타가 파괴되고 황제와 베이더가 최후를 맞다","summary":"반란연합이 건설 중이던 두 번째 데스 스타와 그 방어막을 노려 총공세를 펼쳤다. 지상과 우주, 그리고 한 부자의 대결이 동시에 결판나며 황제와 베이더가 최후를 맞았다.","significance":"시스의 지배가 끝나고 제국의 등뼈가 부러진, 은하 내전의 결정적 승리.","preceded_by":["battle-of-hoth"],"followed_by":["battle-of-jakku"],"tags":["제2데스스타","황제의 최후"],"belligerents":{"side_a":["rebel-alliance"],"side_b":["galactic-empire"]},"outcome":"반란연합 결정적 승리 — 황제·베이더 최후","key_figures":["luke-skywalker","darth-vader","palpatine","han-solo","leia-organa"],"background":"건설 중이던 제2 데스 스타와 방어막을 노려 지상·우주·한 부자의 대결이 동시에 결판났다.","aftermath":"시스의 지배가 끝나고 제국의 등뼈가 부러진 은하 내전의 결정적 승리. 베이더는 아들을 구하며 구원받는다.","deep_dive":[{"phase":"미끼","note":"제국은 일부러 제2 데스 스타가 무방비한 것처럼 정보를 흘려 반란 함대를 함정으로 끌어들인다."},{"phase":"숲의 동맹","note":"방어막 발생기를 부수려는 지상팀이 엔도의 토착 이워크족과 뜻밖의 동맹을 맺는다."},{"phase":"함대의 위기","note":"방어막이 여전히 살아 있는 채로 도착한 반란 함대가 작동 중인 데스 스타의 주포와 제국 함대 사이에 갇힌다."},{"phase":"아버지와 아들","note":"데스 스타 안에서 루크는 황제의 유혹과 베이더와의 대결에 직면한다. 증오 대신 광선검을 내던지며 다크사이드를 거부한다."},{"phase":"구원과 승리","note":"아들이 고통받는 것을 본 베이더가 황제를 내치고 아나킨으로 돌아와 숨을 거둔다. 방어막이 무너지고 제2 데스 스타가 폭발하며 제국의 등뼈가 부러진다."}],"work":"ep-6-return-of-jedi"},{"id":"battle-of-jakku","title":"자쿠 전투","title_en":"Battle of Jakku","era":"new_republic","year_value":5,"year_label":"5 ABY","year_certainty":"exact","category":"battle","tier":1,"characters":[],"locations":["jakku"],"factions":["new-republic","galactic-empire"],"source":"여파 3부작 (소설)","source_type":"novel","canon_status":"referenced","one_liner":"은하 내전을 종결지은 신공화국과 제국 잔당의 마지막 대회전","summary":"엔도 이후에도 저항하던 제국 잔당과 신생 신공화국이 사막 행성 자쿠에서 마지막 대회전을 벌였다. 이 전투의 패배로 제국은 사실상 무릎을 꿇었다.","significance":"은하 내전을 공식적으로 끝맺고, 잔당이 미지의 영역으로 물러나 훗날 퍼스트 오더로 자라날 길을 연다.","preceded_by":["battle-of-endor"],"followed_by":["galactic-concordance"],"tags":["제국 잔당","내전 종결"],"belligerents":{"side_a":["new-republic"],"side_b":["galactic-empire"]},"outcome":"신공화국 승리 — 내전 종결","key_figures":[],"background":"엔도 이후에도 저항하던 제국 잔당과 신생 신공화국이 사막 행성에서 마지막 대회전을 벌였다.","aftermath":"제국이 사실상 무릎을 꿇고 은하 내전이 공식 종결된다. 잔당은 미지의 영역으로 물러나 훗날 퍼스트 오더의 씨앗이 된다.","deep_dive":[{"phase":"꺼지지 않은 잔불","note":"엔도에서 황제가 스러진 뒤에도 제국 잔당은 항복하지 않고 곳곳에서 저항을 이어갔다."},{"phase":"최후의 결집","note":"신생 신공화국과 제국 잔여 함대가 사막 행성 자쿠 상공에서 내전의 명운을 건 대회전을 벌인다."},{"phase":"추락하는 제국","note":"치열한 공방 끝에 제국 함대가 무너지고, 거대한 잔해들이 자쿠의 모래 위로 떨어진다. 훗날 폐선의 묘지가 된다."},{"phase":"미지로의 후퇴","note":"패배한 잔당은 미지의 영역으로 물러난다. 이 도주가 훗날 퍼스트 오더로 자라날 씨앗이 된다."}],"work":"aftermath-trilogy"},{"id":"galactic-concordance","title":"갈락틱 컨코드","title_en":"Galactic Concordance","era":"new_republic","year_value":5,"year_label":"5 ABY","year_certainty":"exact", 시퀄 전사)","source_type":"novel","canon_status":"referenced","one_liner":"신공화국이 평화를 믿고 함대를 대폭 줄이다","summary":"오랜 평화 속에서 신공화국은 군비를 대폭 감축하는 법을 통과시켰다. 다시는 거대한 군사력이 폭정으로 이어지지 않게 하려는 이상이었지만, 동시에 다가올 위협 앞에 스스로를 무방비로 만든다.","significance":"이상주의적 평화가 역설적으로 퍼스트 오더의 부상을 방치하는 결과를 낳는다.","belligerents":{"side_a":["new-republic"],"side_b":[]},"outcome":"군비 대폭 감축, 안보 공백 발생","key_figures":[],"background":"제국의 폭정을 겪은 신공화국은 거대 군사력 자체를 경계했다.","aftermath":"줄어든 군사력은 미지의 영역에서 자라던 퍼스트 오더를 견제하지 못하는 빈틈이 된다.","deep_dive":[],"tags":["신공화국","정치","군축"],"preceded_by":["liberation-of-coruscant"],"followed_by":["rise-of-the-resistance"],"work":"bloodline"},{"id":"rise-of-the-resistance","title":"저항군의 결성","title_en":"Rise of the Resistance","era":"new_republic","year_value":28.5,"year_label":"~28 ABY","year_certainty":"approximate","category":"founding","tier":1,"characters":["leia-organa"],"locations":[],"factions":["resistance","new-republic"],"source":"스타워즈 캐넌 (시퀄 전사)","source_type":"novel","canon_status":"referenced","one_liner":"레이아가 방심한 공화국을 대신해 사설 저항군을 세우다","summary":"퍼스트 오더의 위협을 직감한 레이아는, 이를 외면하는 신공화국을 더 기다리지 않고 사설 군사 조직 저항군을 결성한다. 공화국의 묵인과 의심 속에서 외롭게 시작된 경계의 불씨였다.","significance":"공화국이 보지 못한 위협에 홀로 맞선 조직. 곧 닥칠 퍼스트 오더 전쟁의 유일한 방패가 된다.","belligerents":{"side_a":["resistance"],"side_b":["new-republic"]},"outcome":"저항군 창설","key_figures":["leia-organa"],"background":"신공화국은 퍼스트 오더를 과소평가했고, 공식적으로 맞설 의지가 없었다.","aftermath":"레이아의 저항군은 작고 고립됐지만, 호스니안 사태 이후 인류의 마지막 방어선이 된다.","deep_dive":[{"phase":"외면받은 경고","note":"레이아가 퍼스트 오더의 위협을 경고하지만 공화국은 귀를 닫는다."},{"phase":"홀로 선 결단","note":"기다림을 포기한 그녀가 사설 군사 조직을 직접 꾸린다."},{"phase":"고립된 불씨","note":"공화국의 의심 속에서 저항군은 작고 외롭게 출발한다."},{"phase":"마지막 방패","note":"훗날 공화국이 무너졌을 때, 이 작은 불씨가 유일한 저항으로 남는다."}],"tags":["저항군","결성","경계"],"preceded_by":["military-disarmament"],"followed_by":["battle-of-takodana"],"work":"bloodline"},{"id":"battle-of-takodana","title":"타코다나 전투","title_en":"Battle of Takodana","era":"rise_of_the_first_order","year_value":33.9,"year_label":"~34 ABY","year_  return `<svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice"><defs><radialGradient id="eg" cx="35%" cy="28%" r="90%"><stop offset="0%" stop-color="${c.g[0]}"/><stop offset="55%" stop-color="${c.g[1]}"/><stop offset="100%" stop-color="#04060b"/></radialGradient><filter id="ef"><feTurbulence type="fractalNoise" baseFrequency="0.006 0.009" numOctaves="3" seed="9"/><feColorMatrix type="matrix" values="0 0 0 0 ${ar}  0 0 0 0 ${ag}  0 0 0 0 ${ab}  0 0 0 0.5 0"/></filter></defs><rect width="1200" height="800" fill="url(#eg)"/><rect width="1200" height="800" filter="url(#ef)" opacity="0.32"/>${STARS}</svg>`;

const ERA={dawn_of_the_jedi:"제다이의 여명",high_republic:"하이 리퍼블릭",fall_of_the_jedi:"제다이의 몰락",reign_of_the_empire:"제국의 시대",age_of_rebellion:"반란의 시대",new_republic:"뉴 리퍼블릭",rise_of_the_first_order:"퍼스트 오더의 부상",new_jedi_order:"뉴 제다이 오더"};
const CAT={battle:"전투",duel:"결투",politics:"정치",mission:"임무",founding:"창건",fall:"몰락",discovery:"발견",treaty:"조약",other:"기타"};
const STYP={film:"영화",series:"시리즈",novel:"소설",comic:"코믹",game:"게임"};
const CERT_BORDER={exact:"solid",approximate:"dashed",disputed:"dotted"};
const CERT_KO={exact:"확정",approximate:"근사",disputed:"논쟁"};
const CANON_OP={explicit:1,referenced:.9,inferred:.78};
const CANON_KO={explicit:"명시",referenced:"언급",inferred:"추론"};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const EMBC={light:"#5aa9ff",dark:"#ff5a4d",neutral:"#c2a86a"};
function facEmb(f){const a=(FACMAP[f]&&FACMAP[f].a)||"neutral";const n=FACMAP[f]?esc(FACMAP[f].n):f;return `<span class="fac"><svg class="emb-mini" style="color:${EMBC[a]}"><use href="#emb-${f}"/></svg>${n}</span>`;}
function getId(){const u=new URLSearchParams(location.search);return u.get("id")||location.hash.replace("#","")||"battle-of-yavin";}

function entityChips(ids,label,kind){
  if(!ids||!ids.length)return"";
  const chips=ids.map(id=>{
    if(kind==="char"&&CHARMAP[id])return `<a class="chip" href="character-detail.html?id=${id}" title="${esc(CHARMAP[id])} 기록 보기"><span class="nm">${esc(CHARMAP[id])}</span><span class="ref">${esc(id)}</span></a>`;
    if(kind==="loc"&&LOCMAP[id])return `<a class="chip" href="location-detail.html?id=${id}" title="${esc(LOCMAP[id].o)}"><span class="nm">${esc(LOCMAP[id].n)}</span><span class="ref">${esc(id)}</span></a>`;
    if(kind==="fac"&&FACMAP[id])return `<a class="chip" href="faction-detail.html?id=${id}" title="${esc(FACMAP[id].o)}"><span class="nm">${esc(FACMAP[id].n)}</span><span class="ref">${esc(id)}</span></a>`;
    return `<span class="chip pending" title="해당 축 준비 중"><span class="nm">${esc(id.replace(/-/g," "))}</span><span class="ref">${esc(id)}</span></span>`;
  }).join("");
  return `<div class="chip-group"><div class="grp-label">${label}</div><div class="chips">${chips}</div></div>`;
}
function navLink(id,dir){
  if(!id||!BYID[id])return `<span style="flex:1"></span>`;
  const e=BYID[id];const cls=dir==="next"?"next":"";
  return `<a class="${cls}" href="?id=${id}"><div class="dir">${dir==="next"?"다음 사건 →":"← 이전 사건"}</div><div class="t">${esc(e.title)}</div></a>`;
}
function render(){
  const e=BYID[getId()];const app=document.getElementById("app");
  if(!e){app.innerHTML=`<div class="notfound">해당 사건 기록을 찾을 수 없습니다.<br><a class="back" href="timeline.html">← 타임라인으로</a></div>`;return;}
  document.title=`${e.title} · 사건 기록`;
  document.getElementById("eraBg").innerHTML=eraBackdrop(e.era);
  app.innerHTML=`
  <div class="hud-bar">
    <a href="timeline.html">스타워즈 캐넌 아카이브</a><span class="sep">//</span>
    <span>${e.era.toUpperCase()}</span><span class="sep">//</span><span class="id">${e.id}</span>
  </div>
  <article class="record" style="opacity:${CANON_OP[e.canon_status]||1}">
    <span class="corner tl"></span><span class="corner br"></span>
    <div class="kicker">사건 기록 · Event Record</div>
    <h1>${esc(e.title)}</h1><div class="title-en">${esc(e.title_en)}</div>
    <div class="meta">
      <span class="badge year" style="border-style:${CERT_BORDER[e.year_certainty]}" title="연대 확정도: ${CERT_KO[e.year_certainty]}"><b>${esc(e.year_label)}</b></span>
      <span class="badge">${ERA[e.era]}</span><span class="badge">${CAT[e.category]||e.category}</span>
      <span class="badge">tier ${e.tier}</span><span class="badge canon" title="원작 확정도">canon · ${CANON_KO[e.canon_status]}</span>
    </div>
    <div class="rule"></div>
    <p class="one-liner">${esc(e.one_liner)}</p>
    <div class="readout">
      <div><span class="k">era</span><span class="v">${e.era}</span></div>
      <div><span class="k">year_value</span><span class="v">${e.year_value}</span></div>
      <div><span class="k">year_certainty</span><span class="v">${e.year_certainty}</span></div>
      <div><span class="k">tier</span><span class="v">${e.tier}</span></div>
      <div><span class="k">category</span><span class="v">${e.category}</span></div>
      <div><span class="k">canon_status</span><span class="v">${e.canon_status}</span></div>
    </div>
    ${e.belligerents?`<div class="sec-label">교전 · Belligerents</div><div class="belli"><div class="side"><div class="sl">SIDE A</div>${(e.belligerents.side_a||[]).map(facEmb).join("")||'<span class="fac" style="color:var(--faint)">—</span>'}</div><div class="vs">VS</div><div class="side"><div class="sl">SIDE B</div>${(e.belligerents.side_b||[]).map(facEmb).join("")||'<span class="fac" style="color:var(--faint)">—</span>'}</div></div>`:""}
    ${e.outcome?`<div class="sec-label">결과 · Outcome</div><p class="outcome">${esc(e.outcome)}</p>`:""}
    ${e.key_figures&&e.key_figures.length?`<div class="sec-label">핵심 인물 · Key Figures</div><div class="kfig">${e.key_figures.map(id=>CHARMAP[id]?`<a class="chip" href="character-detail.html?id=${id}"><span class="nm">${esc(CHARMAP[id])}</span></a>`:"").join("")}</div>`:""}
    ${e.background?`<div class="sec-label">배경 · Background</div><p class="sec-body">${esc(e.background)}</p>`:""}
    <div class="sec-label">개요 · Summary</div><p class="sec-body">${esc(e.summary)}</p>
    ${e.significance?`<div class="sec-label">의미 · Significance</div><p class="sec-body dim">${esc(e.significance)}</p>`:""}
    ${e.aftermath?`<div class="sec-label">여파 · Aftermath</div><p class="sec-body">${esc(e.aftermath)}</p>`:""}
    ${e.deep_dive&&e.deep_dive.length?`<div class="sec-label">전개 · Deep Dive</div><div class="dd">${e.deep_dive.map(d=>`<div class="step"><div class="ph">${esc(d.phase)}</div><div class="nt">${esc(d.note)}</div></div>`).join("")}</div>`:""}
    <div class="rule"></div>
    <div class="sec-label">연결 · Linked Entities</div>
    ${entityChips(e.characters,"인물 · characters","char")}
    ${entityChips(e.locations,"장소 · locations","loc")}
    ${entityChips(e.factions,"세력 · factions","fac")}
    <div class="srcline">출처 · <b>${esc(e.source)}</b> · ${STYP[e.source_type]||e.source_type}${e.work?` · <a class="worklink" href="film-detail.html?id=${e.work}">작품 보기 ▸</a>`:""}</div>
    ${e.tags&&e.tags.length?`<div class="tags">${e.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}</div>`:""}
    <div class="legend-hint">연대 배지 테두리 = 확정도(실선 확정 · 파선 근사 · 점선 논쟁) · 기록 투명도 = 원작 확정도(명시·언급·추론). 데이터 그대로의 시각 인코딩입니다 (헌법 제5조).</div>
  </article>
  <div class="nav">${navLink(e.preceded_by&&e.preceded_by[0],"prev")}${navLink(e.followed_by&&e.followed_by[0],"next")}</div>
  <a class="back" href="timeline.html">← 전체 타임라인으로</a>`;
  window.scrollTo(0,0);
}
async function loadData(){
  try{
    const [ev,ch,lo,fa]=await Promise.all([
      fetch("events.json").then(r=>r.json()),
      fetch("characters.json").then(r=>r.json()),
      fetch("locations.json").then(r=>r.json()),
      fetch("factions.json").then(r=>r.json())
    ]);
    EVENTS=ev;BYID=Object.fromEntries(ev.map(e=>[e.id,e]));
    CHARMAP=Object.fromEntries(ch.map(c=>[c.id,c.name]));
    LOCMAP=Object.fromEntries(lo.map(l=>[l.id,{n:l.name,o:l.one_liner}]));
    FACMAP=Object.fromEntries(fa.map(f=>[f.id,{n:f.name,o:f.one_liner,a:f.alignment}]));
    render();
  }catch(err){
    document.getElementById("app").innerHTML=`<div class="notfound"><div style="font-family:var(--fd);font-size:1.1rem;color:var(--ink);margin-bottom:14px">데이터 파일을 불러오지 못했습니다</div>이 페이지는 events·characters·locations·factions.json을 직접 읽습니다 (헌법 제2조 — 하나의 공유 스키마).<br>파일을 더블클릭하면 브라우저 보안정책(file://)이 막습니다. 로컬 서버로 열어주세요:<br><br><code style="color:var(--holo);font-family:var(--fm)">python3 -m http.server</code><br><br>그 뒤 <code style="color:var(--holo);font-family:var(--fm)">localhost:8000/event-detail.html?id=battle-of-yavin</code></div>`;
  }
}
window.addEventListener("popstate",render);
document.addEventListener("click",e=>{const a=e.target.closest('a[href^="?id="]');if(a){e.preventDefault();history.pushState({},"",a.getAttribute("href"));render();}});
loadData();
</script>
</body></html>
