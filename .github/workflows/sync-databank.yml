name: sync-databank
on:
  schedule:
    - cron: "0 19 * * 0"   # 매주 일요일 KST 04:00
  workflow_dispatch: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python3 scripts/fetch_databank.py characters
      - run: python3 scripts/build_mapping.py
      - run: python3 scripts/enrich_characters.py
      - run: python3 validate.py
      - uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: databank external_refs 주간 갱신"
          branch: auto/databank-sync
          commit-message: "chore: databank sync (external_refs only)"
